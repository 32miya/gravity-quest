// DQ4風 扉グラフィック（ダンジョン・城の部屋間遷移ポイントに重ねて描画）
function _drawRoomDoor(ctx, px, py, mc) {
    const T = TILE_SIZE, fl = Math.floor;
    const { demon, cave, castle, tower, shrine } = mc;
    ctx.save();
    // 文脈別カラー
    const C = demon  ? { frm:'#1a0608', pnl:'#380c10', rib:'#580818', hng:'#800020', knb:'#c01830', hi:'#ff2040' }
            : cave   ? { frm:'#2a2018', pnl:'#4a3420', rib:'#5a4028', hng:'#484030', knb:'#a09060', hi:'#c8b880' }
            :          { frm:'#3c2c18', pnl:'#6a4828', rib:'#7a5838', hng:'#505050', knb:'#c0a040', hi:'#e8c860' };
    // 扉の寸法（タイルから少し上にはみ出す）
    const dW = fl(T*0.82), dH = fl(T*1.05);
    const dX = px + fl((T-dW)/2), dY = py - dH + fl(T*0.98);
    // 影
    ctx.fillStyle='rgba(0,0,0,0.30)'; ctx.fillRect(dX+3,dY+3,dW,dH);
    // 石枠（外）
    ctx.fillStyle=C.frm; ctx.fillRect(dX-2,dY-2,dW+4,dH+2);
    // 扉パネル
    ctx.fillStyle=C.pnl; ctx.fillRect(dX,dY,dW,dH);
    // 扉の光沢（左側面が少し明るい）
    ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.fillRect(dX,dY,fl(dW*0.28),dH);
    // 横リブ（2本）— 木目 or 金属補強
    const ribH=fl(T*0.07);
    [fl(dH*0.28), fl(dH*0.65)].forEach(ry=>{
        ctx.fillStyle=C.rib; ctx.fillRect(dX+2,dY+ry,dW-4,ribH);
        ctx.fillStyle='rgba(255,255,255,0.10)'; ctx.fillRect(dX+2,dY+ry,dW-4,1);
    });
    // 縦中央リブ
    ctx.fillStyle=C.rib; ctx.fillRect(dX+fl(dW/2)-1,dY+2,2,dH-4);
    // ヒンジ（左側、上下2か所）
    [fl(dH*0.18), fl(dH*0.72)].forEach(hy=>{
        ctx.fillStyle=C.hng; ctx.fillRect(dX-1,dY+hy,6,fl(T*0.12));
        ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fillRect(dX-1,dY+hy,6,1);
    });
    // ドアノブ（右寄り中央）
    const kX=dX+fl(dW*0.72), kY=dY+fl(dH*0.50);
    ctx.fillStyle=C.knb; ctx.beginPath(); ctx.arc(kX,kY,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.hi; ctx.beginPath(); ctx.arc(kX-1,kY-1,1.2,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=C.hng; ctx.lineWidth=1; ctx.strokeRect(dX-1,dY-1,dW+2,dH+1);
    // 魔王城：赤い装飾ライン
    if(demon){
        ctx.strokeStyle='rgba(180,20,20,0.6)'; ctx.lineWidth=0.8;
        ctx.strokeRect(dX+3,dY+3,dW-6,dH-6);
        ctx.fillStyle='rgba(200,30,30,0.4)'; ctx.beginPath(); ctx.arc(dX+fl(dW/2),dY+fl(dH*0.08),3,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawNpcSign(ctx, cx, ty, emoji, label, bgColor) {
    ctx.font = 'bold 7px sans-serif';
    let lw = ctx.measureText(label).width, ew = 11, pad = 3, h = 12, w = ew + lw + pad * 2;
    let rx = cx - w / 2, ry = ty - h - 26;
    ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(rx - 1, ry - 1, w + 2, h + 2);
    ctx.fillStyle = bgColor; ctx.fillRect(rx, ry, w, h);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 0.5; ctx.strokeRect(rx, ry, w, h);
    ctx.font = '9px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle'; ctx.fillStyle = '#fff';
    ctx.fillText(emoji, rx + 1, ry + h / 2);
    ctx.font = 'bold 7px sans-serif'; ctx.fillText(label, rx + ew, ry + h / 2);
}

            ctx.fillStyle = 'rgba(120,220,60,0.3)';
            for (let di = 0; di < 8; di++) ctx.fillRect(px + fl((rand * 8.9 + di * 5.1) % (T - 1)), py + fl((rand * 7.3 + di * 4.2) % (T - 1)), 2, 2);

        }

                for (let _vs = 0; _vs <= 14; _vs++) {
                    const _vt = _vs / 14;
                    const _ang = _bang + _vt * Math.PI * 2.5;
                    const _vrad2 = _vt * _vr * 0.93;
                    const _vx = _vc + Math.cos(_ang) * _vrad2, _vy = _vcy + Math.sin(_ang) * _vrad2;

            await typeMessage(`「いつか 必ず この手で\n魔王を 倒す。\n────── それが わたしの 誓いだ。」`);
            await typeMessage(`グラマニアの 城下町に 帰還した ${_hero}。\n国王グラードが 招集の 知らせを 出したという……`);
            await typeMessage(`────── だが この旅の 果てに\n${_hero}を 待つのは\n誰も 知らない 残酷な 真実だった ──────`);
            _screen.style.transition = ''; _screen.style.opacity = '1';
            hideAllWindows(); state = 'FIELD'; drawMap(); updateBGM(); updatePartyStatus(); showWindow('party-status'); updateGoldWindow();
            return;
        }
        else if(choiceStr === 'ぼうけんのしょ') {
            if(s) { partyData = JSON.parse(s); partyData.members.forEach(m => { if (!m.equipment.shield) m.equipment.shield = null; if (!m.equipment.helmet) m.equipment.helmet = null; if (!m.equipment.accessory) m.equipment.accessory = null; }); if (!partyData.flags) partyData.flags = {}; if (!partyData.flags.visited_maps) partyData.flags.visited_maps = {}; partyData.flags.visited_maps['map_field_2_2'] = true; applyGrowthDataToParty(false); break; }
            else { await showCustomDialog('alert', "ぼうけんのしょ が ありません。"); }
        }
        else if(choiceStr === 'つづきから（2周目）') { let parsed = JSON.parse(s); await startSecondLoop(parsed); break; }
        else if(choiceStr === 'ふっかつのじゅもん') {
            let pwd = await showCustomDialog('prompt', "神父に聞いた ふっかつのじゅもん を\n入力してください。\n（裏技の入力もここです）");
            if(pwd !== null) {
                pwd = pwd.trim();
                if(pwd === "GRAVITY最高！") {
                    partyData = await loadExternalData('party'); partyData.flags = { none: true }; if(externalMapData) { partyData.pos.map = externalMapData['map_town_01'] ? 'map_town_01' : Object.keys(externalMapData)[0]; partyData.pos.x = 10; partyData.pos.y = 18; } applyGrowthDataToParty(true);
                    let weps = Object.values(masterData.items).filter(i=>i.type==='weapon').sort((a,b)=>(b.power||b.attack||0)-(a.power||a.attack||0)); let arms = Object.values(masterData.items).filter(i=>i.type==='armor').sort((a,b)=>(b.power||b.defense||0)-(a.power||a.defense||0)); let shds = Object.values(masterData.items).filter(i=>i.type==='shield').sort((a,b)=>(b.power||b.defense||0)-(a.power||a.defense||0)); let hlms = Object.values(masterData.items).filter(i=>i.type==='helmet').sort((a,b)=>(b.power||b.defense||0)-(a.power||a.defense||0));
                    partyData.members.forEach(m => { const bw=weps.find(i=>canEquip(m,i)); const ba=arms.find(i=>canEquip(m,i)); const bs=shds.find(i=>canEquip(m,i)); const bh=hlms.find(i=>canEquip(m,i)); if(bw)m.equipment.weapon=bw.id; if(ba)m.equipment.armor=ba.id; if(bs)m.equipment.shield=bs.id; if(bh)m.equipment.helmet=bh.id; });
                    for(let i=0; i<partyData.members.length; i++) { let m = partyData.members[i]; let input = await showCustomDialog('prompt', `${m.job} の名前を決めてください\n空白で「${m.name}」`, m.name); if(input !== null && input.trim() !== "") m.name = input.trim().substring(0, 4); }
                    await showCustomDialog('alert', "【裏技成功】\n全員が 最強の装備 を手に入れた\n状態で始まります！"); break;
                }
                else if(pwd === "グラちゃんすきすき") {
                    partyData = await loadExternalData('party'); partyData.flags = { none: true }; if(externalMapData) { partyData.pos.map = externalMapData['map_town_01'] ? 'map_town_01' : Object.keys(externalMapData)[0]; partyData.pos.x = 10; partyData.pos.y = 18; } applyGrowthDataToParty(true);
                    partyData.members.forEach(m => { m.lv = 25; m.exp = 99999; if (masterData.growth && masterData.growth[m.job]) { let gt = masterData.growth[m.job]; let lvD = gt.find(g => g.level === 25) || gt[gt.length-1]; if(lvD) { m.max_hp=lvD.hp; m.max_mp=lvD.mp; m.atk=lvD.atk; m.def=lvD.def; m.spd=lvD.spd; m.hp=m.max_hp; m.mp=m.max_mp; m.spells=[]; for(let lvl=1; lvl<=25; lvl++) { let d = gt.find(g => g.level === lvl); if(d?.learnMagic) { d.learnMagic.forEach(name => { const fd = Object.values(masterData.spells).find(s => s.name === name); if(fd && !m.spells.includes(fd.id)) m.spells.push(fd.id); }); } } } } });
                    for(let i=0; i<partyData.members.length; i++) { let m = partyData.members[i]; let input = await showCustomDialog('prompt', `${m.job} の名前を決めてください\n空白で「${m.name}」`, m.name); if(input !== null && input.trim() !== "") m.name = input.trim().substring(0, 4); }
                    await showCustomDialog('alert', "【裏技成功】\n全員の レベルが25 の状態で\n始まります！"); break;
                }
                else if(pwd === "ようきな壺") {
                    partyData = await loadExternalData('party'); partyData.flags = { none: true }; if(externalMapData) { partyData.pos.map = externalMapData['map_town_01'] ? 'map_town_01' : Object.keys(externalMapData)[0]; partyData.pos.x = 10; partyData.pos.y = 18; } applyGrowthDataToParty(true); partyData.gold = 10000;
                    for(let i=0; i<partyData.members.length; i++) { let m = partyData.members[i]; let input = await showCustomDialog('prompt', `${m.job} の名前を決めてください\n空白で「${m.name}」`, m.name); if(input !== null && input.trim() !== "") m.name = input.trim().substring(0, 4); }
                    await showCustomDialog('alert', "【裏技成功】\n所持金が 10000G の状態で\n始まります！"); break;
                }
                else if(pwd === "人生五十年") { await startSecondLoop(null); break; }
                else if(pwd !== "") {
                    let unpacked = unpackSaveData(pwd);
                    if (unpacked) {
                        if (unpacked.type === 'clear') { await startSecondLoop(unpacked.data); break; } 
                        else { partyData = unpacked.data; applyGrowthDataToParty(false); await showCustomDialog('alert', "ふっかつのじゅもん が\n受け入れられました！"); break; }
                    } else { await showCustomDialog('alert', "じゅもん が ちがいます！"); }
                }
            }
        }
        else if(choiceStr === 'ぼうけんのしょを消す') {
            let conf = await showCustomDialog('confirm', "本当に ぼうけんのしょ（セーブデータ）を\n消してもよろしいですか？\n（この操作は取り消せません）");
            if(conf) { localStorage.removeItem('gravity_quest_save'); await showCustomDialog('alert', "ぼうけんのしょ は\n完全に消し去られました。"); }
        }
    }
    document.getElementById('title-screen').style.display = 'none';
    currentMap = await loadExternalData('map-' + partyData.pos.map);
    state = 'FIELD'; drawMap(); updateBGM();
}

setInterval(() => { if (state === 'FIELD' || state === 'MSG') drawMap(); }, 100);
</script>

<script>
// ═══ STANDALONE OVERRIDE: init() — 外部fetchなしで全DB適用 ═══
window.onload = null; // 元の onload を解除
let _loadPct = 0;
function _animLoad() {
    const _lo = document.getElementById('loading-overlay');
    if (!_lo || _lo.style.display === 'none') return;
    const _lt = document.getElementById('loading-text');
    if (_lt) { const _d = '.'.repeat((Math.floor(Date.now() / 350) % 3) + 1); _lt.textContent = 'loading' + _d + ' ' + Math.floor(_loadPct) + '%'; }
    requestAnimationFrame(_animLoad);
}

async function init() {
    resizeCanvas();
    masterData = await loadExternalData('master');

    // アイテムDB
    if (window.ITEM_DATABASE) {
        const db = window.ITEM_DATABASE;
        (db.weapons||[]).forEach(w => masterData.items[w.id] = {id:w.id,name:w.name,type:'weapon',price:w.price,power:w.attack,desc:w.description});
        (db.armors||[]).forEach(a => masterData.items[a.id] = {id:a.id,name:a.name,type:'armor',price:a.price,power:a.defense,desc:a.description});
        (db.shields||[]).forEach(s => masterData.items[s.id] = {id:s.id,name:s.name,type:'shield',price:s.price,power:s.defense,desc:s.description});
        (db.helmets||[]).forEach(h => masterData.items[h.id] = {id:h.id,name:h.name,type:'helmet',price:h.price,power:h.defense,desc:h.description});
        (db.accessories||[]).forEach(x => masterData.items[x.id] = {id:x.id,name:x.name,type:'accessory',price:x.price,power:x.defense||0,effect:x.effect,desc:x.description});
        (db.items||[]).forEach(i => masterData.items[i.id] = {id:i.id,name:i.name,type:'tool',price:i.price,effect:i.effect,value:i.value,desc:i.description});
    }
    // 魔法DB
    if (window.MAGIC_DATABASE) {
        window.MAGIC_DATABASE.forEach(m => {
            masterData.spells[m.id] = {id:m.id,name:m.name,type:m.type,target:m.target,mp:m.mp_cost,value:m.power,desc:m.description,element:m.element};
        });
    }
    // モンスターDB
    if (window.MONSTER_DATABASE) {
        window.MONSTER_DATABASE.forEach(m => {
            masterData.monsters[m.id] = {name:m.name,max_hp:m.hp,atk:m.attack,def:m.defense,spd:m.speed,exp:m.exp,gold:m.gold};
            if (m.image && m.image.startsWith('http')) {
                let img = new Image(); img.crossOrigin = "Anonymous"; img.src = m.image;
                externalImages['enemy_' + m.id] = img;
            }
        });
        if (masterData.monsters['slime']) masterData.monsters['m01'] = masterData.monsters['slime'];
        if (masterData.monsters['ghost']) masterData.monsters['m02'] = masterData.monsters['ghost'];
        if (externalImages['enemy_slime']) externalImages['enemy_m01'] = externalImages['enemy_slime'];
        if (externalImages['enemy_ghost']) externalImages['enemy_m02'] = externalImages['enemy_ghost'];
    }
    // 成長DB
    if (window.EXT_GROWTH) {
        const ext = window.EXT_GROWTH;
        masterData.growth = {};
        (ext.characterData || []).forEach(char => {
            masterData.growth[char.job] = char.growth;
            if (char.sprites) {
                const li = (src) => { if (!src) return null; let img = new Image(); img.src=src; img.onload = () => { if (state === 'FIELD' || state === 'MSG') drawMap(); }; return img; };
                const _liD = li(char.sprites.down); if (_liD) externalImages['sprite_' + char.id + '_down'] = _liD;
                const _liU = li(char.sprites.up); if (_liU) externalImages['sprite_' + char.id + '_up'] = _liU;
                const _liL = li(char.sprites.left); if (_liL) externalImages['sprite_' + char.id + '_left'] = _liL;
            }
        });
    }
    // 音楽DB
    if (window.SOUND_DATABASE) { AudioManager.db = window.SOUND_DATABASE; AudioManager.preloadAllBGMs(); }
    // 2周目モンスターDB
    if (window.SL_MONSTER_DATABASE) {
        window.SL_MONSTER_DATABASE.forEach(m => {
            let mId = "sl_m_" + m.id;
            let hp = parseInt(m.hp) || 500;
            masterData.monsters[mId] = {
                name: m.name,
                max_hp: Math.ceil(hp / 2),
                atk: Math.min(120, 30 + Math.floor(hp / 30)),
                def: Math.min(60,  15 + Math.floor(hp / 60)),
                spd: Math.min(80,  20 + Math.floor(hp / 50)),
                exp: Math.floor(hp), gold: Math.floor(hp / 2)
            };
            if (m.img) { let img = new Image(); img.crossOrigin="Anonymous"; img.src=m.img; externalImages['enemy_' + mId] = img; }
        });
    }

    showTitleScreen();
}
window.onload = init;
</script>
