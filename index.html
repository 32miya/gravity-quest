        // --- Lv1とLv99のステータス定義 (曲線計算用) ---
        const baseStats = {
            hero:    { hp: [18, 800], mp: [5, 250], atk: [4, 350], def: [3, 300], spd: [3, 300] },
            warrior: { hp: [22, 950], mp: [0, 0],   atk: [6, 450], def: [4, 400], spd: [2, 150] },
            mage:    { hp: [12, 500], mp: [15, 600],atk: [2, 100], def: [2, 150], spd: [5, 450] },
            priest:  { hp: [15, 650], mp: [10, 400],atk: [3, 220], def: [3, 250], spd: [4, 250] },
            grappler:{ hp: [22, 950], mp: [0, 0],   atk: [12, 900], def: [8, 800], spd: [4, 300] },
            sage:    { hp: [20, 1500],mp: [30, 999],atk: [4, 400], def: [3, 350], spd: [8, 600] },
            paladin: { hp: [45, 2500],mp: [10, 600],atk: [7, 800], def: [8, 999], spd: [4, 350] },
            jester:  { hp: [25, 1200],mp: [5, 400], atk: [3, 300], def: [2, 250], spd: [15, 800] },
            samurai: { hp: [38, 2200],mp: [0, 0],   atk: [10, 999],def: [5, 500], spd: [9, 700] },
            dancer:  { hp: [28, 1600],mp: [15, 800],atk: [5, 500], def: [4, 400], spd: [18, 900] },
            ninja:   { hp: [32, 1900],mp: [8, 500], atk: [9, 900], def: [4, 450], spd: [20, 999] }
        };

        // --- 魔法習得テーブル ---
        const magicTable = {
            hero: { 3: ["ホイム"], 6: ["メラン"], 9: ["ルーラ"], 11: ["レミト"], 14: ["ベホイム"], 17: ["トヘロ"], 23: ["ライデン"] },
            warrior: {}, 
            mage: { 1: ["メラン"], 4: ["ヒャドン"], 7: ["ギラン"], 10: ["ルカン"], 13: ["メラミィ"], 15: ["トラマナ"], 19: ["バイキル"], 22: ["ヒャダイン"], 26: ["ベギラン"] },
            priest: { 1: ["ホイム"], 4: ["スカラー"], 8: ["バギス"], 12: ["ベホイム"], 15: ["マヌーサ"], 20: ["ザオーン"], 24: ["ベホマラ"] },
            grappler: {},
            sage: { 2: ["ホイム"], 5: ["メラン"], 16: ["ヒャドン"], 18: ["バギス"], 21: ["ベホイム"], 25: ["ギラン"], 27: ["メラミィ"], 29: ["ヒャダイン"], 31: ["ザオラル"], 33: ["ベギラン"], 35: ["ライデン"], 38: ["ベホマラ"] },

            jester: { 16: ["トヘロ"], 27: ["ルーラ"], 39: ["レミト"] },
            samurai: {},
            dancer: { 2: ["マヌーサ"], 21: ["ルカン"], 36: ["ベホマラ"] },
            ninja: { 5: ["メラン"], 16: ["ヒャドン"], 25: ["バギス"], 37: ["バイキル"] }
        };

        // --- 成長テーブル生成 (URLと同じカーブ計算) ---
        function getStat(min, max, level) {
            const ratio = (level - 1) / 98;
            const curve = Math.pow(ratio, 0.95);
            return Math.floor(min + (max - min) * curve);
        }

        characterData.forEach(char => {
            const stats = baseStats[char.id];
            const magic = magicTable[char.id];
            
            for (let L = 1; L <= 99; L++) {
                let reqExp = 0;
                if (L > 1) {
                    const x = L - 1;
                    reqExp = Math.floor(15 * x + 2 * Math.pow(x, 2) + 1.5 * Math.pow(x, 3));
                }

                char.growth.push({
                    level: L, reqExp: reqExp,
                    hp: getStat(stats.hp[0], stats.hp[1], L), mp: getStat(stats.mp[0], stats.mp[1], L),

            }
        });

                btn.className = 'tab-btn';
                btn.innerText = char.job;
                btn.onclick = () => selectCharacter(index);
                tabContainer.appendChild(btn);
            });
        }

        function selectCharacter(index) {
            const btns = tabContainer.querySelectorAll('.tab-btn');
            btns.forEach((btn, i) => {
                if(i === index) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            const data = characterData[index];

            document.getElementById('val-id').innerText = data.id;
            document.getElementById('val-name').innerText = data.defaultName;
            document.getElementById('val-job').innerText = data.job;
            document.getElementById('val-gender').innerText = data.gender;
            document.getElementById('val-weapons').innerText = data.weapons; 

            // 画像プレビューの更新
            const imgUp = document.getElementById('img-spr-up');
            const imgDown = document.getElementById('img-spr-down');
            const imgLeft = document.getElementById('img-spr-left');
            const imgRight = document.getElementById('img-spr-right');
            const descLeft = document.getElementById('desc-spr-left');
            const descRight = document.getElementById('desc-spr-right');

            imgUp.src = data.sprites.up;
            imgDown.src = data.sprites.down;
            imgLeft.src = data.sprites.left;
            imgRight.src = data.sprites.right;

            // 表示位置や反転のリセット
            imgLeft.style.transform = "none";
            imgRight.style.transform = "none";
            imgUp.style.transform = "none";
            imgDown.style.transform = "none";
            descLeft.style.display = "none";
            descRight.style.display = "none";

            // 左右の画像URLが同じ場合、元画像がどちらを向いているかで反転先を決定する
            if(data.sprites.right === data.sprites.left && !data.sprites.right.startsWith("img/")) {
                if (data.baseFacing === "right") {
                    imgLeft.style.transform = "scaleX(-1)";
                    descLeft.style.display = "block";
                } else {
                    imgRight.style.transform = "scaleX(-1)";
                    descRight.style.display = "block";
                }
            }

            // 僧侶の中央化微調整
            if (data.id === "priest") {
                imgDown.style.transform = "translateX(-15%) scale(1.1)"; 
                imgUp.style.transform = "translateX(15%) scale(1.1)"; 
            }

            // テーブルの更新
            tbody.innerHTML = '';
            data.growth.forEach(g => {
                const tr = document.createElement('tr');
                if (g.level === 40) tr.className = 'clear-level';
                
                tr.innerHTML = `
                    <td>${g.level}</td>
                    <td>${g.reqExp}</td>
                    <td>${g.hp}</td>
                    <td>${g.mp}</td>
                    <td>${g.atk}</td>
                    <td>${g.def}</td>
                    <td>${g.spd}</td>
                    <td class="magic-cell">${g.learnMagic.length > 0 ? g.learnMagic.join(', ') : '-'}</td>
                `;
                tbody.appendChild(tr);
            });
            
            document.querySelector('.table-responsive').scrollTop = 0;
        }

        if (document.getElementById('tab-container')) {
            initTabs();
            selectCharacter(8);
        }
window.EXT_GROWTH = { characterData, baseStats, magicTable };
</script>

function packSaveData(pData) {
    // ① unescape trick: 日本語名がBase64で膨張しない
    // ③ v:2マーカー + 装備5スロットを|結合で圧縮
    const minObj = {
        v: 2,
        g: pData.gold,
        p: [pData.pos.map.replace(/^map_/, ''), pData.pos.x, pData.pos.y],
        f: Object.keys(pData.flags || {}).filter(k => pData.flags[k] === true),
        c: pData.members.map(mb => [
            mb.name, mb.job, mb.lv, mb.exp,
            [mb.equipment.weapon||'', mb.equipment.armor||'', mb.equipment.shield||'', mb.equipment.helmet||'', mb.equipment.accessory||''].join('|'),
            mb.inventory.join('|'),
            mb.spells.join('|')
        ])
    };
    return btoa(unescape(encodeURIComponent(JSON.stringify(minObj))));
}

function unpackSaveData(pwd) {
    pwd = pwd.replace(/\s+/g, '');
    if (!pwd) return null;

    // CLEAR_プレフィックス: 後続のbase64部分を再帰デコードしてtype:'clear'で返す
    if (pwd.startsWith('CLEAR_')) {
        const _r = unpackSaveData(pwd.slice(6));
        if (_r && _r.type === 'normal') return { type: 'clear', data: _r.data };
        return _r;
    }

    // デコード: 新形式(unescape trick)→旧形式の順で試みる
    const _tryDec = (b64) => {
        try { return decodeURIComponent(escape(atob(b64))); } catch(e) {}
        try { return decodeURIComponent(atob(b64)); } catch(e) {}
        return null;
    };
    const decoded = _tryDec(pwd);
    if (!decoded) return null;

    let obj;
    try { obj = JSON.parse(decoded); } catch(e) { return null; }

    // 旧形式: 生のpartyDataオブジェクト
    if (obj.members && obj.pos) return { type: 'normal', data: obj };

    const _mapName = (s) => s.startsWith('map_') ? s : 'map_' + s;
    const _buildMember = (mb, isV2) => {
        let bs = { hp: 50, max_hp: 50, mp: 20, max_mp: 20, atk: 10, def: 10, spd: 10 };
        if (masterData && masterData.growth && masterData.growth[mb[1]]) {
            const g = masterData.growth[mb[1]].find(g => g.level === mb[2]);
            if (g) bs = { hp: g.hp, max_hp: g.hp, mp: g.mp||0, max_mp: g.mp||0, atk: g.atk||10, def: g.def||10, spd: g.spd||10 };
        }
        if (isV2) {
            // v:2: 装備は"|"結合文字列、インベントリ/呪文も"|"区切り
            const eq = (mb[4] || '').split('|');
            return {
                id: 'p' + Math.random(), name: mb[0], job: mb[1], lv: mb[2], exp: mb[3], ...bs,
                equipment: { weapon: eq[0]||null, armor: eq[1]||null, shield: eq[2]||null, helmet: eq[3]||null, accessory: eq[4]||null },
                inventory: mb[5] ? mb[5].split('|').filter(Boolean) : [],
                spells:    mb[6] ? mb[6].split('|').filter(Boolean) : []
            };
        } else {
            // 旧形式: 装備は個別インデックス、","区切り
            return {
                id: 'p' + Math.random(), name: mb[0], job: mb[1], lv: mb[2], exp: mb[3], ...bs,
                equipment: { weapon: mb[4]||null, armor: mb[5]||null, shield: mb[6]||null, helmet: mb[7]||null, accessory: mb[8]||null },
                inventory: mb[9]  ? mb[9].split(',')  : [],
                spells:    mb[10] ? mb[10].split(',') : []
            };
        }
    };

    if (obj.c) {
        const isV2 = obj.v === 2;
        const flags = {};
        if (obj.f) obj.f.forEach(k => { flags[k] = true; });
        const members = obj.c.map(mb => _buildMember(mb, isV2));
        return { type: 'normal', data: { gold: obj.g||0, steps_to_encounter: 15, tohero_steps: 0, tramana_steps: 0, members, flags, pos: { map: _mapName(obj.p[0]), x: obj.p[1], y: obj.p[2] }, dir: 2 } };
    }

    return null;
}

const AudioManager = {
    ctx: null, bgmAudio: null, currentBgmKey: null, isMuted: false, masterVolume: 0.7, db: { bgm: {}, se: {} }, masterGainNode: null, bgmSourceNode: null, bgmBlobCache: {},
    init() { if (!this.ctx) { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } if (this.ctx.state === 'suspended') this.ctx.resume(); if (!this.masterGainNode) { this.masterGainNode = this.ctx.createGain(); this.masterGainNode.connect(this.ctx.destination); this.masterGainNode.gain.value = this.masterVolume; } },
    playBGM(key) { 
        this.init(); if (this.currentBgmKey === key) { if(this.bgmAudio && this.bgmAudio.paused && !this.isMuted) { this.bgmAudio.play().catch(e=>{}); } return; } 
        this.stopBGM(); this.currentBgmKey = key; let url = this.db.bgm[key]; 
        if (!url || url === "ここにURLを貼る") { 
            if (key === 'demon_castle') url = this.db.bgm['dungeon'] || this.db.bgm['field_late']; 
            else if (key === 'sky_castle') url = this.db.bgm['castle'] || this.db.bgm['town']; 
            else if (key === 'tower') url = this.db.bgm['castle'] || this.db.bgm['dungeon']; 
            else { if (key === "victory" && !this.isMuted) this.playSynthVictory(); return; } 
        } 
        if (!url) return;
        const _blobSrc = this.bgmBlobCache[url]; this.bgmAudio = new Audio(); if (!_blobSrc) this.bgmAudio.crossOrigin = "anonymous"; this.bgmAudio.loop = true; this.bgmAudio.volume = this.masterVolume; this.bgmAudio.src = _blobSrc || url;
        if (!_blobSrc && !this.bgmBlobCache[url]) { fetch(url).then(r => r.blob()).then(b => { if (!this.bgmBlobCache[url]) this.bgmBlobCache[url] = URL.createObjectURL(b); }).catch(() => {}); }
        try { this.bgmSourceNode = this.ctx.createMediaElementSource(this.bgmAudio); this.bgmSourceNode.connect(this.masterGainNode); } catch(e) { this.bgmAudio.volume = this.masterVolume; }
        if(!this.isMuted) { const _a = this.bgmAudio; const _play = () => { if (_a === this.bgmAudio) _a.play().catch(e => console.warn("BGM blocked")); }; if (this.ctx && this.ctx.state === 'suspended') { this.ctx.resume().then(_play).catch(_play); } else { _play(); } }
    },
    stopBGM() { if (this.bgmAudio) { this.bgmAudio.pause(); this.bgmAudio.removeAttribute('src'); this.bgmAudio.load(); try { if(this.bgmSourceNode) this.bgmSourceNode.disconnect(); } catch(e){} this.bgmAudio = null; this.bgmSourceNode = null; } this.currentBgmKey = null; },
    playSE(key) { if(this.isMuted) return; this.init(); const url = this.db.se[key]; if (!url || url === "ここにURLを貼る") { this.playSynthSE(key); return; } const seAudio = new Audio(url); seAudio.crossOrigin = "anonymous"; seAudio.volume = 1.0; try { const source = this.ctx.createMediaElementSource(seAudio); source.connect(this.masterGainNode); seAudio.onended = () => { source.disconnect(); seAudio.removeAttribute('src'); }; } catch(e){ seAudio.volume = this.masterVolume; } seAudio.play().catch(e => console.warn("SE blocked")); },
    playTone(freq, type, duration, vol=0.5, slideFreq=null) { if(this.isMuted || !this.ctx) return; this.init(); const osc = this.ctx.createOscillator(); const gainNode = this.ctx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime); if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + duration); gainNode.gain.setValueAtTime(vol, this.ctx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration); osc.connect(gainNode); gainNode.connect(this.masterGainNode); osc.start(); osc.stop(this.ctx.currentTime + duration); },
    playNoise(duration, vol=0.5) { if(this.isMuted || !this.ctx) return; this.init(); const bufferSize = this.ctx.sampleRate * duration; const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate); const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1; const noise = this.ctx.createBufferSource(); noise.buffer = buffer; const filter = this.ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 1000; const gainNode = this.ctx.createGain(); gainNode.gain.setValueAtTime(vol, this.ctx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration); noise.connect(filter); filter.connect(gainNode); gainNode.connect(this.masterGainNode); noise.start(); },
    playSynthSE(key) { if(this.isMuted) return; switch(key) { case 'cursor': this.playTone(880, 'square', 0.05, 0.2); break; case 'decision': this.playTone(660, 'square', 0.1, 0.2); setTimeout(() => this.playTone(880, 'square', 0.15, 0.2), 100); break; case 'cancel': this.playTone(200, 'sawtooth', 0.2, 0.3); break; case 'attack_hit': this.playNoise(0.1, 0.5); this.playTone(150, 'square', 0.1, 0.3, 50); break; case 'attack_crit': this.playNoise(0.3, 0.8); this.playTone(200, 'sawtooth', 0.3, 0.5, 50); break; case 'damage_hero': this.playTone(100, 'square', 0.2, 0.4, 20); this.playNoise(0.15, 0.4); break; case 'magic_cast': this.playTone(400, 'sine', 0.4, 0.3, 1200); setTimeout(() => this.playTone(600, 'sine', 0.3, 0.2, 1600), 100); break; case 'poison': this.playTone(150, 'sawtooth', 0.1, 0.3, 80); setTimeout(() => this.playTone(120, 'sawtooth', 0.1, 0.3, 60), 150); break; case 'item_get': [440, 554, 659, 880].forEach((f, i) => setTimeout(() => this.playTone(f, 'square', 0.15, 0.2), i * 120)); break; case 'save': this.playTone(440, 'square', 0.1, 0.2); setTimeout(() => this.playTone(880, 'square', 0.15, 0.2), 100); break; case 'inn': const notes = [{f: 440, d: 0.15}, {f: 554, d: 0.15}, {f: 659, d: 0.15}, {f: 880, d: 0.6}]; let delay = 0; notes.forEach(n => { setTimeout(() => this.playTone(n.f, 'square', n.d, 0.2), delay * 1000); delay += n.d; }); break; case 'level_up': [523.25, 523.25, 523.25, 659.25, 783.99, 1046.50].forEach((f, i) => setTimeout(() => this.playTone(f, 'square', i===5?0.4:0.1, 0.2), i * 120)); break;
        case 'travel_gate':
            // DQ風旅の扉SE: 上昇する魔法的なアルペジオ
            [392, 523.25, 659.25, 784, 1046.5, 1318.5, 1568, 2093].forEach((f, i) => {
                setTimeout(() => {
                    this.playTone(f, 'sine', 0.26 - i*0.02, 0.2);
                    if (i < 5) this.playTone(f * 1.5, 'sine', 0.1 - i*0.01, 0.08);
                }, i * 65);
            });
            setTimeout(() => this.playNoise(0.45, 0.04), 20);
            break; } },
    playSynthVictory() { if(this.isMuted) return; this.stopBGM(); const notes = [{f: 349.23, d: 0.12}, {f: 349.23, d: 0.12}, {f: 349.23, d: 0.12}, {f: 349.23, d: 0.35}, {f: 293.66, d: 0.15}, {f: 233.08, d: 0.15}, {f: 293.66, d: 0.15}, {f: 349.23, d: 0.15}, {f: 466.16, d: 0.8}]; let delay = 0; notes.forEach(n => { setTimeout(() => this.playTone(n.f, 'square', n.d, 0.3), delay * 1000); delay += n.d + 0.02; }); },
    preloadAllBGMs() { const seen = new Set(); Object.values(this.db.bgm).forEach(url => { if (!url || url.includes('ここに') || seen.has(url) || this.bgmBlobCache[url]) return; seen.add(url); fetch(url).then(r => r.blob()).then(b => { if (!this.bgmBlobCache[url]) this.bgmBlobCache[url] = URL.createObjectURL(b); }).catch(() => {}); }); },
    async preloadAllBGMsTracked(onProgress) { const seen = new Set(); const _us = Object.values(this.db.bgm).filter(u => u && !u.includes('ここに') && !seen.has(u) && !this.bgmBlobCache[u] && (seen.add(u), true)); if (!_us.length) { onProgress && onProgress(1); return; } let _done = 0; await Promise.all(_us.map(u => fetch(u).then(r => r.blob()).then(b => { if (!this.bgmBlobCache[u]) this.bgmBlobCache[u] = URL.createObjectURL(b); onProgress && onProgress(++_done / _us.length); }).catch(() => { onProgress && onProgress(++_done / _us.length); }))); }
};

function toggleVolume() { AudioManager.init(); const container = document.getElementById('volume-slider-container'); if (container.style.display === 'none' || container.style.display === '') { container.style.display = 'block'; } else { container.style.display = 'none'; } }
function closeVolumeSlider(e) { const container = document.getElementById('volume-slider-container'); const btn = document.getElementById('btn-mute'); if (container && container.style.display === 'block') { if (!container.contains(e.target) && !btn.contains(e.target)) { container.style.display = 'none'; } } }
document.addEventListener('mousedown', closeVolumeSlider); document.addEventListener('touchstart', closeVolumeSlider);

const volumeSlider = document.getElementById('volume-slider');
volumeSlider.addEventListener('input', (e) => {
    AudioManager.init(); const val = parseFloat(e.target.value); AudioManager.masterVolume = val;
    const muteBtn = document.getElementById('btn-mute'); if (val === 0) { muteBtn.innerText = '🔇'; AudioManager.isMuted = true; } else if (val <= 0.5) { muteBtn.innerText = '🔉'; AudioManager.isMuted = false; } else { muteBtn.innerText = '🔊'; AudioManager.isMuted = false; }
    if (AudioManager.masterGainNode) AudioManager.masterGainNode.gain.setTargetAtTime(val, AudioManager.ctx.currentTime, 0.05);
    if (AudioManager.bgmAudio) { if (!AudioManager.bgmSourceNode) AudioManager.bgmAudio.volume = val; if (AudioManager.isMuted) AudioManager.bgmAudio.pause(); else if (AudioManager.bgmAudio.paused && AudioManager.currentBgmKey) AudioManager.bgmAudio.play().catch(err=>{}); } else if (!AudioManager.isMuted && AudioManager.currentBgmKey) { let key = AudioManager.currentBgmKey; AudioManager.currentBgmKey = null; AudioManager.playBGM(key); }
});

const unlockAudio = () => { AudioManager.init(); if (!AudioManager.isMuted && AudioManager.currentBgmKey && (!AudioManager.bgmAudio || AudioManager.bgmAudio.paused)) { AudioManager.playBGM(AudioManager.currentBgmKey); } };
document.addEventListener('click', unlockAudio, { once: true }); document.addEventListener('touchstart', unlockAudio, { once: true });

function getMapRandom(x, y, mapId) { let seed = 0; let mStr = mapId || ""; for(let i=0; i<mStr.length; i++) seed += mStr.charCodeAt(i); return Math.abs(Math.sin(x * 12.9898 + y * 78.233 + seed) * 43758.5453) % 1; }
function getMapDisplayName(mapId, mapObj) { if (mapObj && mapObj.name) return mapObj.name; if (!mapId) return "フィールド"; if (mapId.includes('town_01')) return "城下町グラマニア"; if (mapId.includes('castle_01')) return "グラマニア城"; if (mapId.includes('dungeon_1f')) return "試練の洞窟 1F"; if (mapId.includes('dungeon_b1f')) return "試練の洞窟 B1F"; if (mapId.includes('dungeon_b2f')) return "試練の洞窟 B2F"; if (mapId.includes('dungeon_b3f')) return "試練の洞窟 B3F"; if (mapId.includes('tower_1f')) return "天空の塔 1F"; if (mapId.includes('tower_2f')) return "天空の塔 2F"; if (mapId.includes('tower_3f')) return "天空の塔 3F"; if (mapId.includes('demon_castle_1f')) return "魔王城 1F"; if (mapId.includes('demon_castle_2f')) return "魔王城 2F"; if (mapId.includes('demon_castle_3f')) return "魔王城 3F"; if (mapId.includes('demon_castle_4f')) return "魔王城 4F"; if (mapId.includes('shrine')) return "ほこら"; if (mapId.includes('town') || mapId.includes('village') || mapId.includes('market')) return "街・村"; if (mapId.includes('dungeon') || mapId.includes('cave')) return "ダンジョン"; if (mapId.includes('field')) return "フィールド"; return "未知の場所"; }
function getCurrentWorldPos() { let m = partyData.pos.map; let wx = -1, wy = -1; if (m.startsWith('map_field_') && m.split('_').length >= 4) { wx = parseInt(m.split('_')[2]); wy = parseInt(m.split('_')[3]); } else if (m.includes('town') || m.includes('castle')) { wx = 2; wy = 2; } else if (m.includes('dungeon') || m.includes('cave')) { wx = 2; wy = 0; } else if (m.includes('shrine')) { wx = 2; wy = 3; } else if (m.includes('north')) { wx = 2; wy = 0; } else if (m.includes('south')) { wx = 2; wy = 4; } else if (m.includes('east')) { wx = 4; wy = 2; } else if (m.includes('west')) { wx = 0; wy = 2; } if (wx === -1 || wy === -1) { wx = 2; wy = 2; } return {x: wx, y: wy}; }
async function showWorldMap() {
    const SCALE = 2, MW = 15, MG = 5;
    if (!partyData.flags.visited_maps) partyData.flags.visited_maps = {};
    // Starting castle area always visible
    partyData.flags.visited_maps['map_field_2_2'] = true;
    const vm = partyData.flags.visited_maps;

    const tC = t => {
        if(t===5) return '#1a5c9a';
        if(t===11||t===12) return '#3e9a22';
        if(t===19) return '#1e6010';
        if(t===20) return '#7a6838';
        if(t===0) return '#b8ae68';
        if(t===1||t===4||t===15||t===16||t===17||t===18) return '#4a4a4a';
        if(t===21||t===22) return '#ffe880';
        if(t===9||t===10) return '#8a5010';
        return '#2a2a2a';
    };

    const FOG = '#0c0e18';
    const cv = document.createElement('canvas');
    cv.width = MW*MG*SCALE; cv.height = MW*MG*SCALE;
    const ctx2 = cv.getContext('2d');
    ctx2.fillStyle = FOG; ctx2.fillRect(0,0,cv.width,cv.height);

    for (let gy = 0; gy < MG; gy++) {
        for (let gx = 0; gx < MG; gx++) {
            const mapId = `map_field_${gx}_${gy}`;
            const m = externalMapData[mapId];
            if (!m) continue;

            // 全景表示: 未訪問でも地形を描画
            for (let ty = 0; ty < MW; ty++) for (let tx = 0; tx < MW; tx++) {
                ctx2.fillStyle = tC(m.tiles[ty*MW+tx]);
                ctx2.fillRect((gx*MW+tx)*SCALE, (gy*MW+ty)*SCALE, SCALE, SCALE);
            }
            // Building/landmark dots at exit positions
            if (m.exits) {
                for (const [ek, ed] of Object.entries(m.exits)) {
                    if (!ed || !ed.map) continue;
                    const [ex2, ey2] = ek.split(',').map(Number);
                    const dm = ed.map;
                    let dc = null;
                    if (dm.includes('town')||dm.includes('village')||dm.includes('market')) dc='#ffe566';
                    else if (dm.includes('castle')&&!dm.includes('demon')&&!dm.includes('death')) dc='#aaccff';
                    else if (dm.includes('dharma')) dc='#ffd080';
                    else if (dm.includes('shrine')) dc='#aaffcc';
                    else if (dm.includes('tower')&&!dm.includes('demon')) dc='#88aaff';
                    else if (dm.includes('dungeon')||dm.includes('cave')) dc='#ff9966';
                    else if (dm.includes('demon')||dm.includes('maou')||dm.includes('death')) dc='#ff3333';
                    if (dc) {
                        ctx2.fillStyle = dc;
                        const bx=(gx*MW+ex2)*SCALE-1, by=(gy*MW+ey2)*SCALE-1;
                        ctx2.fillRect(bx,by,5,5);
                        ctx2.fillStyle='rgba(255,255,255,0.7)';
                        ctx2.fillRect(bx+1,by+1,2,2);
                    }
                }
            }
        }
    }

    // Grid lines (subtle)
    ctx2.strokeStyle = 'rgba(60,80,120,0.35)'; ctx2.lineWidth = 0.5;
    for (let i = 1; i < MG; i++) {
        ctx2.beginPath(); ctx2.moveTo(i*MW*SCALE,0); ctx2.lineTo(i*MW*SCALE,MG*MW*SCALE); ctx2.stroke();
        ctx2.beginPath(); ctx2.moveTo(0,i*MW*SCALE); ctx2.lineTo(MG*MW*SCALE,i*MW*SCALE); ctx2.stroke();
    }

    // Current position dot
    const pMapId = partyData.pos.map;
    let pgx = -1, pgy = -1, ppx = -1, ppy = -1;
    if (pMapId && /^map_field_(\d)_(\d)$/.test(pMapId)) {
        const parts = pMapId.split('_');
        pgx = parseInt(parts[2]); pgy = parseInt(parts[3]);
    } else {
        // Non-field map: approximate from getCurrentWorldPos
        const wp = getCurrentWorldPos(); pgx = wp.x; pgy = wp.y;
    }
    if (pgx >= 0 && pgy >= 0) {
        const _px = pMapId && /^map_field_/.test(pMapId) ? partyData.pos.x : MW/2;
        const _py = pMapId && /^map_field_/.test(pMapId) ? partyData.pos.y : MW/2;
        ppx = (pgx*MW+_px)*SCALE; ppy = (pgy*MW+_py)*SCALE;
        // Pulsing dot
        ctx2.fillStyle = '#ff2222'; ctx2.fillRect(ppx-2,ppy-2,6,6);
        ctx2.fillStyle = '#ff8888'; ctx2.fillRect(ppx-1,ppy-1,4,4);
        ctx2.fillStyle = '#ffffff'; ctx2.fillRect(ppx,ppy,2,2);
    }

    const imgSrc = cv.toDataURL();

    // Legend

    // ── 雷 (ギラ / FF Thunder / HP Fulmen) ──────────────────────────
    const _buildBolt=(x1,y1,x2,y2,d,dep,segs)=>{
        if(dep<=0||d<2){segs.push([x1,y1,x2,y2]);return;}
        const mx=(x1+x2)/2+(Math.random()-0.5)*d, my=(y1+y2)/2+(Math.random()-0.5)*d;
        _buildBolt(x1,y1,mx,my,d/2,dep-1,segs); _buildBolt(mx,my,x2,y2,d/2,dep-1,segs);
        if(Math.random()<0.4&&dep>1){const bx=mx+(Math.random()-0.5)*d*1.6,by=my+Math.random()*d*0.7;_buildBolt(mx,my,bx,by,d/3,dep-2,segs);}
    };
    const _drawBolt=(x1,y1,x2,y2,d,dep,al)=>{
        const segs=[]; _buildBolt(x1,y1,x2,y2,d,dep,segs);
        ctx.shadowColor='rgba(160,160,255,0.8)'; ctx.shadowBlur=18+tier*5;
        ctx.strokeStyle=`rgba(120,120,255,${al*0.45})`; ctx.lineWidth=(2.5+dep)*1.6;
        ctx.beginPath(); segs.forEach(([a,b,c,e])=>{ctx.moveTo(a,b);ctx.lineTo(c,e);}); ctx.stroke();
        ctx.strokeStyle=`rgba(255,255,255,${al})`; ctx.lineWidth=1.2+dep*0.5;
        ctx.beginPath(); segs.forEach(([a,b,c,e])=>{ctx.moveTo(a,b);ctx.lineTo(c,e);}); ctx.stroke();
        clearGlow();
    };

    const drawLightning = (t) => {
        // 電光が走るたびに黄白に染まる
        const flashes=tier>=3?9:tier>=2?6:4;
        const cycleT=(t*flashes)%1;
        const fa=cycleT<0.55?Math.sin(cycleT/0.55*Math.PI):0;

        // 画面フラッシュ
        if(fa>0.05){ctx.globalAlpha=fa*(0.22+tier*0.1);ctx.fillStyle='rgba(255,255,200,0.9)';ctx.fillRect(0,0,W,H);}

        drawImpact(t,'rgba(255,255,120,0.9)','rgba(180,180,255,1)');

        // 上空・左右から複数の電撃が収束
        if(fa>0.02){
            const boltN=3+tier*2;
            for(let b=0;b<boltN;b++){
                const bAngle=(b/boltN)*Math.PI*2;
                const dist=W*0.6+tier*40;
                const sx=tcx+Math.cos(bAngle)*dist+(Math.random()-0.5)*40;
                const sy=tcy+Math.sin(bAngle)*dist+(Math.random()-0.5)*40;
                _drawBolt(sx,sy,tcx+(Math.random()-0.5)*22,tcy+(Math.random()-0.5)*18,28+tier*16,4+tier,fa);
            }
            // 着弾点の電球グロー
            ctx.globalAlpha=fa*0.75;
            ctx.shadowColor='#ffffaa'; ctx.shadowBlur=30+tier*14;
            ctx.fillStyle=rg(tcx,tcy,28+tier*18,'rgba(255,255,200,0.95)','transparent');
            ctx.beginPath(); ctx.arc(tcx,tcy,28+tier*18,0,Math.PI*2); ctx.fill(); clearGlow();
            // 放電スパーク
            ctx.globalAlpha=fa*0.9; ctx.fillStyle='#ffffee';
            for(let i=0;i<14+tier*8;i++){
                const sa=i/(14+tier*8)*Math.PI*2+Math.random();
                const sr=8+Math.random()*(44+tier*22);
                ctx.beginPath(); ctx.arc(tcx+Math.cos(sa)*sr,tcy+Math.sin(sa)*sr,1.2+Math.random()*2.5,0,Math.PI*2); ctx.fill();
            }
            // 電気リング
            ctx.globalAlpha=fa*0.6; ctx.strokeStyle='rgba(200,200,255,0.8)'; ctx.lineWidth=2;
            ctx.shadowColor='#aaaaff'; ctx.shadowBlur=15;
            for(let ri=0;ri<tier+1;ri++){
                const rr=(12+ri*16+fa*20)*(1+ri*0.3);
                ctx.beginPath(); ctx.arc(tcx,tcy,rr,0,Math.PI*2); ctx.stroke();
            }
            clearGlow();
        }
        ctx.globalAlpha=1;
    };

    // ── 風 (バギ / FF Aero / HP Ventus) ─────────────────────────────
    const drawWind = (t) => {
        // 緑の画面フィルター
        ctx.globalAlpha=Math.sin(t*Math.PI)*(0.1+tier*0.05);
        ctx.fillStyle='rgba(60,200,60,0.3)'; ctx.fillRect(0,0,W,H);

        // 竜巻渦 — 中心に向かうスパイラル
        const spiralN=3+tier;
        for(let si=0;si<spiralN;si++){
            const sp=parts[si*4%N], sPhase=si*0.1;
            const st=Math.max(0,t-sPhase); if(st<=0) continue;
            const spiralT=Math.min(st/0.8,1);
            const spiralR=(55+si*22+tier*18)*Math.max(0,1-spiralT*0.75);
            const angle=sp.angle+st*Math.PI*(5+tier*1.5+si*0.4);
            const lx=tcx+Math.cos(angle)*spiralR;
            const ly=tcy+Math.sin(angle)*spiralR*0.55-st*18;
            const alpha=Math.max(0,Math.sin(spiralT*Math.PI)*0.85);
            if(alpha<=0) continue;
            ctx.globalAlpha=alpha;
            ctx.shadowColor=`hsl(${88+sp.hue*55},100%,65%)`; ctx.shadowBlur=10+tier*4;
            ctx.strokeStyle=`hsla(${90+sp.hue*60},90%,62%,${alpha})`;
            ctx.lineWidth=2+sp.size*3+tier*0.7;
            ctx.beginPath(); ctx.moveTo(lx,ly);
            const nAngle=angle+0.35, nR=spiralR*0.88;
            ctx.lineTo(tcx+Math.cos(nAngle)*nR, tcy+Math.sin(nAngle)*nR*0.55-st*18); ctx.stroke();
            clearGlow();
        }

        // 横断する風刃スラッシュ (HP Wind Slash)
        const slashN=2+tier;
        for(let i=0;i<slashN;i++){
            const p=parts[i*6%N], ph=p.phase*0.4+i*0.15;
            const pt=Math.max(0,(t-ph)/(0.85-ph)); if(pt<=0||pt>=1) continue;
            const alpha=pt<0.22?pt/0.22:Math.max(0,1-(pt-0.22)/0.78);
            const yOff=p.wobble*65, curveH=35+p.size*25;
            const sx=-60+pt*(W+120);
            ctx.globalAlpha=alpha*0.92;
            const hue=82+p.hue*55;
            ctx.shadowColor=`hsl(${hue},100%,68%)`; ctx.shadowBlur=8+tier*3;
            ctx.strokeStyle=`hsl(${hue},88%,65%)`; ctx.lineWidth=2.5+tier*1;
            ctx.beginPath();
            ctx.moveTo(sx-55,tcy+yOff);
            ctx.bezierCurveTo(sx,tcy+yOff-curveH,sx+55,tcy+yOff+curveH,sx+110,tcy+yOff);
            ctx.stroke(); clearGlow();
            // 刃の先端グロー
            ctx.globalAlpha=alpha*0.5; ctx.fillStyle=`hsl(${hue},80%,80%)`;
            ctx.beginPath(); ctx.arc(sx+55,tcy+yOff,3+tier*2,0,Math.PI*2); ctx.fill();
        }

        // 旋回パーティクル
        for(const p of parts){
            const pt=Math.max(0,(t-p.phase*0.5)/(1-p.phase*0.5)); if(pt<=0||pt>=1) continue;
            const angle=p.angle+t*(3.5+tier)*Math.PI*(p.hue>0.5?1:-1);
            const r=(22+p.spd*(42+tier*22))*Math.min(1,pt*3)*Math.max(0,1-pt*0.65);
            const lx=tcx+Math.cos(angle)*r, ly=tcy+Math.sin(angle)*r*0.52-t*35;
            const al=pt<0.35?pt/0.35:Math.max(0,1-(pt-0.35)/0.65);
            ctx.globalAlpha=al*0.75; ctx.fillStyle=`hsl(${88+p.hue*72},88%,65%)`;
            ctx.beginPath(); ctx.arc(lx,ly,1.8+p.size*2.8,0,Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha=1;
    };

    // ── 回復 (ホイム / FF Cure / HP Episkey) ────────────────────────
    const drawHeal = (t) => {
        const isRevive=sid.includes('zao')||sid.includes('zaorn');
        const gold=isRevive||tier>=4;
        const hue1=gold?'rgba(255,240,120,':'rgba(120,255,180,';
        const hue2=gold?'#ffee55':'#55ffaa';

        // 上空から降り注ぐ光の柱
        if(t>0.05&&t<0.85){
            const pillarN=tier>=3?3:tier>=2?2:1;
            for(let pi=0;pi<pillarN;pi++){
                const pOff=(pi-(pillarN-1)/2)*(20+tier*12);
                const pT=Math.max(0,t-pi*0.1);
                const pillarH=H*0.6*(Math.min(pT/0.35,1));
                const pillarA=pT<0.5?pT/0.25:Math.max(0,(0.85-t)/0.35);
                if(pillarA<=0||pillarH<=0) continue;
                ctx.globalAlpha=pillarA*0.62;
                ctx.shadowColor=hue2; ctx.shadowBlur=18+tier*8;
                const pg=ctx.createLinearGradient(tcx+pOff,tcy-pillarH,tcx+pOff,tcy);
                pg.addColorStop(0,`${hue1}0)`); pg.addColorStop(0.6,`${hue1}0.55)`); pg.addColorStop(1,`${hue1}0.9)`);
                ctx.fillStyle=pg;
                ctx.fillRect(tcx+pOff-(8+tier*4),tcy-pillarH,18+tier*8,pillarH);
                clearGlow();
            }
        }

        // 上昇する癒しパーティクル
        for(const p of parts){
            const pt=Math.max(0,(t-p.phase*0.5)/(1-p.phase*0.5)); if(pt<=0||pt>=1) continue;
            const lx=tcx+p.wobble*(38+tier*16)+Math.sin(pt*Math.PI*2.8+p.hue*6)*14;
            const ly=tcy+25-pt*(88+tier*38);
            const sz=(2.8+p.size*4.5)*Math.min(1,pt*4)*Math.max(0,1-pt);
            const al=Math.max(0,1-pt*1.05);
            if(sz<=0||al<=0) continue;
            ctx.globalAlpha=al;
            ctx.shadowColor=hue2; ctx.shadowBlur=sz*2;
            ctx.fillStyle=rg(lx,ly,sz*2,'#ffffff',`${hue1}0)`);
            ctx.beginPath(); ctx.arc(lx,ly,sz*2,0,Math.PI*2); ctx.fill();
        }
        clearGlow();

        // 中心のグロー球
        const glowT=t<0.38?t/0.38:Math.max(0,1-(t-0.38)/0.62);
        const glowR=(38+tier*28)*glowT;
        if(glowR>0){
            ctx.globalAlpha=glowT*0.62;
            ctx.fillStyle=rg(tcx,tcy,glowR*1.6,gold?'rgba(255,245,160,0.92)':'rgba(120,255,180,0.92)','transparent');
            ctx.beginPath(); ctx.arc(tcx,tcy,glowR*1.6,0,Math.PI*2); ctx.fill();
        }

        // tier3+: 光の十字閃光
        if(tier>=3&&t>0.08&&t<0.7){
            const cT=(t-0.08)/0.62, crossA=Math.sin(cT*Math.PI)*0.75;
            const crossL=55+tier*35;
            ctx.globalAlpha=crossA; ctx.lineWidth=4+tier*2;
            ctx.shadowColor=hue2; ctx.shadowBlur=20;
            ctx.strokeStyle=gold?'rgba(255,255,200,0.9)':'rgba(180,255,220,0.9)';
            ctx.beginPath();
            ctx.moveTo(tcx-crossL,tcy); ctx.lineTo(tcx+crossL,tcy);
            ctx.moveTo(tcx,tcy-crossL); ctx.lineTo(tcx,tcy+crossL);
            ctx.stroke(); clearGlow();
        }

        // tier4/ザオーン: 天使の翼シルエット
        if((isRevive||tier>=4)&&t<0.72){
            const wT=(0.72-t)/0.72;
            ctx.globalAlpha=wT*0.82; ctx.lineWidth=2.5;
            ctx.shadowColor=gold?'#ffee44':'#44ffaa'; ctx.shadowBlur=12;
            ctx.strokeStyle=gold?'rgba(255,255,180,0.9)':'rgba(180,255,220,0.9)';
            ctx.beginPath();
            ctx.moveTo(tcx,tcy-8); ctx.bezierCurveTo(tcx-52,tcy-78,tcx-94,tcy-28,tcx-72,tcy+18);
            ctx.moveTo(tcx,tcy-8); ctx.bezierCurveTo(tcx+52,tcy-78,tcx+94,tcy-28,tcx+72,tcy+18);
            ctx.stroke(); clearGlow();
        }

        // 画面淡染め
        const stA=Math.max(0,0.18*glowT); if(stA>0){ctx.globalAlpha=stA;ctx.fillStyle=gold?'rgba(255,245,130,0.8)':'rgba(80,255,140,0.5)';ctx.fillRect(0,0,W,H);}
        ctx.globalAlpha=1;
    };

    // ── 爆発 (イオ / FF Bio / HP Bombarda) ──────────────────────────
    const drawExplosion = (t) => {
        // フェーズ1: 眩いホワイトフラッシュ
        if(t<0.16){ctx.globalAlpha=(0.16-t)/0.16*0.98;ctx.fillStyle='#ffffff';ctx.fillRect(0,0,W,H);}
        // フェーズ2以降: 橙〜赤の環境光
        if(t>0.08){
            ctx.globalAlpha=Math.sin(Math.min((t-0.08)/0.7,1)*Math.PI)*(0.22+tier*0.1);
            ctx.fillStyle='rgba(255,80,0,0.4)'; ctx.fillRect(0,0,W,H);
        }

        // 複数の衝撃波リング
        const ringN=Math.min(tier+3,6);
        for(let ri=0;ri<ringN;ri++){
            const rp=Math.max(0,t-ri*0.07); if(rp<=0) continue;
            const r=rp*(105+tier*58), al=Math.max(0,1-rp*1.05);
            ctx.globalAlpha=al;
            ctx.shadowColor=`hsl(${18+ri*22},100%,58%)`; ctx.shadowBlur=14+tier*4;
            ctx.strokeStyle=`hsl(${18+ri*22},100%,${62+ri*6}%)`;
            ctx.lineWidth=Math.max(0.5,5.5-ri*0.6-rp*2.8+tier*0.5);
            ctx.beginPath(); ctx.arc(tcx,tcy,r,0,Math.PI*2); ctx.stroke(); clearGlow();
        }

        // 爆発コア (白→黄→橙)
        if(t<0.32){
            const cr=(0.32-t)/0.32*(82+tier*55);
            ctx.globalAlpha=(0.32-t)/0.32*0.9;
            ctx.shadowColor='#ff6600'; ctx.shadowBlur=cr*1.5;
            const cg=ctx.createRadialGradient(tcx,tcy,0,tcx,tcy,cr);
            cg.addColorStop(0,'#ffffff'); cg.addColorStop(0.2,'#ffffaa'); cg.addColorStop(0.55,'#ff8800'); cg.addColorStop(1,'rgba(255,20,0,0)');
            ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(tcx,tcy,cr,0,Math.PI*2); ctx.fill(); clearGlow();
        }

        // デブリ (重力付き)
        for(const p of parts){
            const pt=Math.max(0,(t-p.phase*0.3)/(1-p.phase*0.3)); if(pt<=0||pt>=1) continue;
            const spd=72+p.spd*(135+tier*58);
            const lx=tcx+Math.cos(p.angle)*spd*pt;
            const ly=tcy+Math.sin(p.angle)*spd*pt+230*pt*pt*(0.3+p.spd*0.5);
            const sz=(3+p.size*6.5)*Math.max(0,1-pt*0.7);
            const al=Math.max(0,1-pt*0.82);
            if(sz<=0||al<=0) continue;
            ctx.globalAlpha=al;
            const dh=p.hue*85+18;
            ctx.shadowColor=`hsl(${dh},100%,62%)`; ctx.shadowBlur=sz*2.2;
            ctx.fillStyle=`hsl(${dh},100%,${58+p.hue*24}%)`;
            ctx.beginPath(); ctx.arc(lx,ly,sz,0,Math.PI*2); ctx.fill();
        }
        clearGlow();

        // 高Tier: 煙霧リング
        if(tier>=3&&t>0.2){
            const sT=(t-0.2)/0.8;
            ctx.globalAlpha=Math.max(0,0.35*(1-sT));
            ctx.strokeStyle='rgba(180,120,60,0.5)'; ctx.lineWidth=18+tier*6;
            ctx.beginPath(); ctx.arc(tcx,tcy,sT*(140+tier*50),0,Math.PI*2); ctx.stroke();
        }
        ctx.globalAlpha=1;
    };

    // ── 闇 (ドルマ / FF Death / HP Obscuro) ─────────────────────────
    const drawDark = (t) => {
        // 冒頭の暗転
        if(t<0.22){ctx.globalAlpha=(0.22-t)/0.22*0.88;ctx.fillStyle='#000000';ctx.fillRect(0,0,W,H);}
        // 紫フラッシュ
        if(t>=0.14&&t<0.4){ctx.globalAlpha=(t-0.14)/0.26*0.72;ctx.fillStyle='rgba(70,0,160,0.55)';ctx.fillRect(0,0,W,H);}
        // 後期の暗い残像
        if(t>0.6){ctx.globalAlpha=(t-0.6)/0.4*0.45;ctx.fillStyle='rgba(8,0,20,0.55)';ctx.fillRect(0,0,W,H);}

        // 螺旋収束する闇パーティクル
        for(const p of parts){
            const pt=Math.max(0,(t-p.phase)/(1-p.phase)); if(pt<=0||pt>=1) continue;
            const startR=105+p.spd*(85+tier*42);
            const angle=p.angle+t*Math.PI*(3.5+tier*0.8);
            const curR=startR*(1-Math.min(1,t*1.15)*0.9);
            const lx=tcx+Math.cos(angle)*curR, ly=tcy+Math.sin(angle)*curR*0.72;
            const sz=(3.5+p.size*5.5)*Math.max(0,t<0.65?1:(1-t)*3.2);
            const al=Math.max(0,(t<0.65?Math.min(1,t*2.8):(1-t)*3.2)*0.92);
            if(sz<=0||al<=0) continue;
            ctx.globalAlpha=al;
            ctx.shadowColor=`hsl(${278+p.hue*42},100%,52%)`; ctx.shadowBlur=sz*2.5;
            ctx.fillStyle=`hsl(${268+p.hue*62},${72+p.hue*28}%,${22+p.size*36}%)`;
            ctx.beginPath(); ctx.arc(lx,ly,sz,0,Math.PI*2); ctx.fill();
        }
        clearGlow();

        // ブラックホール (開いて閉じる)
        const vr=(t<0.48?t/0.48:Math.max(0,(1-t)/0.52))*(42+tier*28);
        if(vr>0){
            ctx.globalAlpha=0.92;
            const vg=ctx.createRadialGradient(tcx,tcy,0,tcx,tcy,vr);
            vg.addColorStop(0,'#000000'); vg.addColorStop(0.6,'rgba(30,0,60,0.8)'); vg.addColorStop(1,'rgba(60,0,120,0)');
            ctx.fillStyle=vg; ctx.beginPath(); ctx.arc(tcx,tcy,vr,0,Math.PI*2); ctx.fill();
        }

        // 闇の触手
        const tenN=4+tier*2;
        for(let i=0;i<tenN;i++){
            const ag=(i/tenN)*Math.PI*2+t*Math.PI*1.8+(i%2)*Math.PI;
            const len=(52+tier*32)*Math.min(1,t*2.8)*Math.max(0,1-t*1.05);
            if(len<=0) continue;
            ctx.globalAlpha=Math.min(1,t*2.8)*Math.max(0,1-t*1.05)*0.8;
            ctx.shadowColor='#9900ff'; ctx.shadowBlur=12+tier*5;
            ctx.strokeStyle=`rgba(${160+tier*20},0,${220+tier*15},0.85)`; ctx.lineWidth=2.5+tier*0.7;
            ctx.beginPath(); ctx.moveTo(tcx,tcy);
            const mx=tcx+Math.cos(ag+0.4)*len*0.55, my=tcy+Math.sin(ag+0.4)*len*0.55*0.7;
            ctx.quadraticCurveTo(mx,my,tcx+Math.cos(ag)*len,tcy+Math.sin(ag)*len*0.72);
            ctx.stroke(); clearGlow();
        }

        // 闇の稲妻 (tier3+)
        if(tier>=3&&t>0.15&&t<0.75){
            const dlT=(t-0.15)/0.6;
            const dlA=Math.sin(dlT*Math.PI)*0.7;
            for(let dl=0;dl<tier;dl++){
                const dsx=tcx+(Math.random()-0.5)*80, dsy=tcy+(Math.random()-0.5)*40;
                const dex=tcx+(Math.random()-0.5)*60, dey=tcy+(Math.random()-0.5)*40;
                ctx.globalAlpha=dlA*0.85;
                ctx.shadowColor='#cc00ff'; ctx.shadowBlur=14;
                ctx.strokeStyle=`rgba(200,0,255,${dlA})`; ctx.lineWidth=1.5;
                ctx.beginPath(); ctx.moveTo(dsx,dsy); ctx.lineTo(dex,dey); ctx.stroke(); clearGlow();
            }
        }
        ctx.globalAlpha=1;
    };

    // ── バフ / デバフ (スカラ / HP Protego) ─────────────────────────
    const drawBuff = (t) => {
        const isDebuff=etype==='debuff', baseHue=isDebuff?280:55;
        const dir=isDebuff?-1:1;

        // 魔法陣 (ルーン円) が出現して回転
        if(t<0.82){
            const runeT=Math.min(t/0.22,1), runeA=Math.sin(Math.min(t,0.82)/0.82*Math.PI)*(0.85);
            const runeR=(28+tier*22)*runeT;
            ctx.globalAlpha=runeA;
            ctx.shadowColor=isDebuff?'#aa00ff':'#aaff44'; ctx.shadowBlur=14+tier*5;
            ctx.strokeStyle=isDebuff?'rgba(180,0,255,0.85)':'rgba(180,255,60,0.85)'; ctx.lineWidth=2+tier*0.5;
            ctx.beginPath(); ctx.arc(tcx,tcy,runeR,0,Math.PI*2); ctx.stroke();
            // 内側の六芒星
            for(let pt=0;pt<6;pt++){
                const a=(pt/6)*Math.PI*2+t*Math.PI*dir*1.5;
                const bx=tcx+Math.cos(a)*runeR*0.7, by=tcy+Math.sin(a)*runeR*0.7;
                ctx.globalAlpha=runeA*0.65;
                ctx.beginPath(); ctx.moveTo(tcx,tcy); ctx.lineTo(bx,by); ctx.stroke();
            }
            clearGlow();
        }

        // 軌道パーティクル (バフ: 収束上昇 / デバフ: 拡散落下)
        for(const p of parts){
            const pt=Math.max(0,(t-p.phase)/(1-p.phase)); if(pt<=0||pt>=1) continue;
            const orbitR=(28+p.spd*44)*Math.min(1,pt*2.8)*Math.max(0,1-(pt-0.48)*2.2);
            const angle=p.angle+t*Math.PI*(isDebuff?-4:3)*p.spd;
            const lx=tcx+Math.cos(angle)*orbitR;
            const ly=tcy+Math.sin(angle)*orbitR*0.62+(isDebuff?pt*36:-pt*30);
            const sz=(2.2+p.size*3.5)*Math.max(0,Math.sin(pt*Math.PI));
            const al=Math.max(0,Math.sin(pt*Math.PI)*0.92);
            if(sz<=0||al<=0) continue;
            ctx.globalAlpha=al;
            ctx.shadowColor=`hsl(${baseHue+p.hue*55},100%,60%)`; ctx.shadowBlur=sz*2.2;
            ctx.fillStyle=`hsl(${baseHue+p.hue*55},88%,${isDebuff?42+p.hue*22:58+p.hue*22}%)`;
            ctx.beginPath(); ctx.arc(lx,ly,sz,0,Math.PI*2); ctx.fill();
        }
        clearGlow();

        // オーラ光輪
        const auraT=Math.sin(t*Math.PI), auraR=(18+tier*16)*auraT;
        if(auraR>0){
            ctx.globalAlpha=auraT*0.48;
            ctx.fillStyle=rg(tcx,tcy,auraR,isDebuff?'rgba(180,0,255,0.7)':'rgba(200,255,80,0.7)','transparent');
            ctx.beginPath(); ctx.arc(tcx,tcy,auraR,0,Math.PI*2); ctx.fill();
        }
        const stA=Math.max(0,0.14*(1-t*2)); if(stA>0){ctx.globalAlpha=stA;ctx.fillStyle=isDebuff?'rgba(100,0,200,0.6)':'rgba(160,255,60,0.4)';ctx.fillRect(0,0,W,H);}
        ctx.globalAlpha=1;
    };

    const drawWarp = (t) => {
        for(const p of parts){
            const angle=p.angle+t*Math.PI*5, r=p.spd*100*Math.max(0.1,1-t);
            const lx=tcx+Math.cos(angle)*r, ly=tcy+Math.sin(angle)*r*0.6;
            ctx.globalAlpha=(1-t)*0.7; ctx.fillStyle=`hsl(${220+p.hue*60},75%,${50+p.hue*25}%)`;
            ctx.beginPath(); ctx.arc(lx,ly,2+p.size*3,0,Math.PI*2); ctx.fill();
        }
        const pr=20+t*50; ctx.globalAlpha=(1-t)*0.8;
        ctx.fillStyle=rg(tcx,tcy,pr,'#000000','rgba(80,0,180,0)'); ctx.fillRect(tcx-pr,tcy-pr,pr*2,pr*2);
        ctx.globalAlpha=1;
    };

    const drawGeneric = (t) => {
        ctx.globalAlpha=Math.sin(t*Math.PI)*0.12; ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fillRect(0,0,W,H);
        for(const p of parts){
            const pt=Math.max(0,(t-p.phase)/(1-p.phase)); if(pt<=0) continue;
            const spd=42+p.spd*85, lx=tcx+Math.cos(p.angle)*spd*pt, ly=tcy+Math.sin(p.angle)*spd*pt;
            const sz=(3+p.size*5.5)*Math.max(0,1-pt);
            ctx.globalAlpha=Math.max(0,1-pt*1.15);
            ctx.shadowColor=`hsl(${p.hue*360},70%,75%)`; ctx.shadowBlur=sz*1.8;
            ctx.fillStyle=`hsl(${p.hue*360},65%,80%)`;
            ctx.beginPath(); ctx.arc(lx,ly,sz,0,Math.PI*2); ctx.fill();
        }
        clearGlow();
        const stA=Math.max(0,0.22*(1-t*2.5)); if(stA>0){ctx.globalAlpha=stA;ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fillRect(0,0,W,H);}
        ctx.globalAlpha=1;
    };

    const drawFns = {fire:drawFire,ice:drawIce,lightning:drawLightning,wind:drawWind,heal:drawHeal,explosion:drawExplosion,dark:drawDark,buff:drawBuff,debuff:drawBuff,warp:drawWarp,generic:drawGeneric};
    const drawFn = drawFns[etype] || drawGeneric;

    let rafId;
    const start = performance.now();
    const animate = (now) => {
        const t = Math.min(1, (now - start) / dur);
        ctx.clearRect(0, 0, W, H);
        drawFn(t);
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
        if (t < 1) { rafId = requestAnimationFrame(animate); } else { layer.innerHTML = ''; }
    };
    rafId = requestAnimationFrame(animate);
    await new Promise(r => setTimeout(r, dur + 80));
    cancelAnimationFrame(rafId);
    layer.innerHTML = '';
}

async function playFieldWarpEffect(spellId) {
    const layer = document.getElementById('global-effect-layer');
    layer.innerHTML = '';
    const gc = document.getElementById('game-container');
    const W = gc.offsetWidth || 360, H = gc.offsetHeight || 560;
    const cvs = document.createElement('canvas');
    cvs.width = W; cvs.height = H;
    Object.assign(cvs.style, {position:'absolute',top:'0',left:'0',width:'100%',height:'100%',pointerEvents:'none'});
    layer.appendChild(cvs);
    const ctx = cvs.getContext('2d');

    // プレイヤーはフィールドマップ上で常にこの座標に描画される
    const cx = W / 2, cy = Math.floor(H * 0.3) + 12;

    // ルーラ=青紫ポータル, レミト=シアン脱出光
    const isRula = spellId.includes('rula');
    const hueBase = isRula ? 270 : 160;
    const hueRange = isRula ? 60 : 50;

    // パーティクル生成
    const N = 80;
    const rng = (s) => { let x = ((s+1)*1664525+1013904223)&0x7fffffff; return x/0x7fffffff; };
    const parts = Array.from({length:N}, (_,i) => ({
        angle: rng(i*3)*Math.PI*2,
        r: 20 + rng(i*3+1)*80,
        spd: 0.4 + rng(i*3+2)*0.8,
        size: rng(i*7)*1.2,
        hue: rng(i*11)
    }));

    const dur = 1600;
    let rafId;
    const start = performance.now();
    const animate = (now) => {
        const t = Math.min(1, (now - start) / dur);
        ctx.clearRect(0, 0, W, H);

        // フェーズ1(0→0.5): 外から中心へ収束しながら回転
        // フェーズ2(0.5→0.8): 魔法陣リング点滅
        // フェーズ3(0.8→1.0): 白フラッシュ

        // パーティクル
        const spin = t * Math.PI * 8;
        for (const p of parts) {
            const converge = Math.max(0, (t - 0.0) / 0.75);
            const r = p.r * (1 - converge * converge) + 4;
            const ang = p.angle + spin * p.spd;
            const px = cx + Math.cos(ang) * r;
            const py = cy + Math.sin(ang) * r * 0.55;
            const alpha = Math.max(0, (1 - t * 1.1) * 0.85);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = `hsl(${hueBase + p.hue*hueRange},80%,${60+p.size*25}%)`;
            ctx.beginPath();
            ctx.arc(px, py, 1.5 + p.size * 3.5, 0, Math.PI*2);
            ctx.fill();
        }

        // 魔法陣リング (中心)
        if (t < 0.85) {
            const rings = isRula ? 3 : 2;
            for (let ri = 0; ri < rings; ri++) {
                const rr = (12 + ri * 18) * (1 - t * 0.6);
                const ralpha = Math.max(0, (0.85 - t) / 0.85) * (0.5 + 0.5 * Math.sin(t * Math.PI * 10 + ri));
                ctx.globalAlpha = ralpha;
                ctx.strokeStyle = `hsl(${hueBase + ri*20},90%,80%)`;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(cx, cy, rr, 0, Math.PI*2);
                ctx.stroke();

                // 回転する点線分割線
                const segs = 6 + ri * 2;
                for (let si = 0; si < segs; si++) {
                    const sa = (si / segs) * Math.PI * 2 + spin * (ri % 2 === 0 ? 1 : -1) * 0.3;
                    ctx.beginPath();
                    ctx.moveTo(cx + Math.cos(sa) * rr * 0.5, cy + Math.sin(sa) * rr * 0.5);
                    ctx.lineTo(cx + Math.cos(sa) * rr, cy + Math.sin(sa) * rr);
                    ctx.stroke();
                }
            }
        }

        // 中心グロー
        const glowR = 18 * Math.max(0, 1 - t * 0.8);
        if (glowR > 1) {
            const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
            grd.addColorStop(0, `hsla(${hueBase+20},100%,95%,${0.7*(1-t)})`);
            grd.addColorStop(1, `hsla(${hueBase},80%,60%,0)`);
            ctx.globalAlpha = 1;
            ctx.fillStyle = grd;
            ctx.beginPath();
            ctx.arc(cx, cy, glowR, 0, Math.PI*2);
            ctx.fill();
        }

        // フラッシュ (t > 0.8)
        if (t > 0.8) {
            const fa = Math.min(1, (t - 0.8) / 0.2);
            ctx.globalAlpha = fa * 0.9;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, W, H);
        }

        ctx.globalAlpha = 1;
        if (t < 1) { rafId = requestAnimationFrame(animate); } else { layer.innerHTML = ''; }
    };
    rafId = requestAnimationFrame(animate);
    await new Promise(r => setTimeout(r, dur + 80));
    cancelAnimationFrame(rafId);
    layer.innerHTML = '';
}

function fixAllExitLandings() {

            if (!destMap) { const _a = 'map_' + destId; if (externalMapData[_a]) { destId = _a; destMap = externalMapData[_a]; } }
            if (!destMap) { const _b = destId.replace(/^map_/, ''); if (_b !== destId && externalMapData[_b]) { destId = _b; destMap = externalMapData[_b]; } }
            if (!destMap) continue;
            let lx = ex.x, ly = ex.y;
            const toField = /^map_field_/.test(destId) || /^field_/.test(destId);

                const sol = [1,2,4,5,15,16,17,18,19,20];
                if (sol.includes(t) && !destMap.exits[`${lx},${ly}`]) {
                    outer: for (let r=1; r<=6; r++) for (let dy=-r; dy<=r; dy++) for (let dx=-r; dx<=r; dx++) {
                        if (Math.abs(dx)!==r&&Math.abs(dy)!==r) continue;
                        const nx=lx+dx, ny=ly+dy;
                        if (nx<1||ny<1||nx>=destMap.width-1||ny>=destMap.height-1) continue;

async function loadExternalData(id) { 
    if (externalMapData && id.includes('map-')) { 
        let rawId = id.replace('map-', ''); let mapData = null; 
        if (externalMapData[rawId]) mapData = externalMapData[rawId]; 
        else if (externalMapData['map_' + rawId]) mapData = externalMapData['map_' + rawId]; 
        else if (rawId.startsWith('map_') && externalMapData[rawId.substring(4)]) mapData = externalMapData[rawId.substring(4)]; 
        
        if (mapData) { 
            let mapCopy = JSON.parse(JSON.stringify(mapData));
            if (partyData && partyData.flags) { 
                if (partyData.flags.last_boss_defeated || partyData.flags.gate_removed) { let gateKeys = Object.keys(mapCopy.npcs).filter(k => mapCopy.npcs[k].id === 'maou_castle_gate'); gateKeys.forEach(k => { delete mapCopy.npcs[k]; }); } 
                if(partyData.flags.flag_saved_richman) { let rKey = Object.keys(mapCopy.npcs).find(k => mapCopy.npcs[k].id === "npc_sub_richman"); if(rKey) delete mapCopy.npcs[rKey]; }
                if(partyData.flags.flag_mage_trial_cleared) { let mKey = Object.keys(mapCopy.npcs).find(k => mapCopy.npcs[k].id === "npc_sub_mage"); if(mKey) delete mapCopy.npcs[mKey]; }
                if(partyData.flags.flag_weapon_forged) { let smKey = Object.keys(mapCopy.npcs).find(k => mapCopy.npcs[k].id === "npc_sub_smith"); if(smKey) delete mapCopy.npcs[smKey]; }
                if(partyData.flags.flag_has_star_fragment) { let sKey = Object.keys(mapCopy.npcs).find(k => mapCopy.npcs[k].id === "obj_chest_star_frag"); if(sKey) delete mapCopy.npcs[sKey]; }

                // ★修正: 異世界の旅人を (9,6) に配置（秘密ボス撃破後は消す）
                if(partyData.flags.is_second_loop && !partyData.flags.flag_beaten_secret_boss && (rawId.includes("town_01") || mapCopy.name === "城下町グラマニア")) {
                    mapCopy.npcs["9,6"] = { id: "npc_sub_2ndloop", name: "異世界の旅人" };
                } else if(partyData.flags.flag_beaten_secret_boss) { let tKey = Object.keys(mapCopy.npcs).find(k => mapCopy.npcs[k].id === "npc_sub_2ndloop"); if(tKey) delete mapCopy.npcs[tKey]; }

                    if (_fk.startsWith(_defPfx)) { const _nk = _fk.slice(_defPfx.length); if (mapCopy.npcs[_nk]) delete mapCopy.npcs[_nk]; }
                }
            }
            return mapCopy;
        }

    const el = document.getElementById('data-' + id); if(!el) return null; return JSON.parse(el.textContent); 
}

    if (partyData.tohero_steps && partyData.tohero_steps > 0) partyData.tohero_steps--;

async function handleFieldInput(key) { 
    if(isMoving) return; 
    let dx = 0, dy = 0, dir = partyData.dir; 
    if(key === 'ArrowUp') { dy = -1; dir = 0; } 
    if(key === 'ArrowRight') { dx = 1; dir = 1; } 
    if(key === 'ArrowDown') { dy = 1; dir = 2; } 
    if(key === 'ArrowLeft') { dx = -1; dir = 3; } 
    if(dx !== 0 || dy !== 0) { partyData.dir = dir; isMoving = true; try { await moveParty(dx, dy); } finally { isMoving = false; } } 
    if(key === 'Enter') { isMoving = true; try { await checkAction(); } finally { isMoving = false; } } 
    if(key === 'Escape') openMainMenu(); 
}

async function typeMessage(text) { state = 'MSG'; document.getElementById('msg-window').style.display = 'block'; const msgDiv = document.getElementById('msg-text'); msgDiv.innerHTML = ""; for(let i=0; i<text.length; i++) { if(text[i] === '\n') msgDiv.innerHTML += '<br>'; else msgDiv.innerHTML += text[i]; await new Promise(r => setTimeout(r, 20)); } msgDiv.innerHTML += '<span class="blink">▼</span>'; await new Promise(resolve => { inputCallback = (key) => { if(key === 'Enter' || key === 'Escape') { inputCallback = null; resolve(); } }; }); }
async function selectMenu(options, containerId, columns = 1, cancelable = false) { const el = document.getElementById(containerId); el.style.display = 'block'; return new Promise(resolve => { let cursor = 0; const render = () => { let html = `<div style="display:grid; grid-template-columns:repeat(${columns}, 1fr); gap: 5px;">`; options.forEach((opt, i) => { html += `<div>${i === cursor ? '▶' : '&nbsp;&nbsp;'}${opt}</div>`; }); html += `</div>`; el.innerHTML = html; }; render(); inputCallback = (key) => { let moved = false; if(key === 'ArrowUp') { cursor = (cursor - columns + options.length) % options.length; moved = true; } if(key === 'ArrowDown') { cursor = (cursor + columns) % options.length; moved = true; } if(key === 'ArrowLeft') { cursor = (cursor - 1 + options.length) % options.length; moved = true; } if(key === 'ArrowRight') { cursor = (cursor + 1) % options.length; moved = true; } if(moved) AudioManager.playSE('cursor'); render(); if(key === 'Enter') { AudioManager.playSE('decision'); inputCallback = null; el.style.display = 'none'; resolve(cursor); } if(cancelable && key === 'Escape') { AudioManager.playSE('cancel'); inputCallback = null; el.style.display = 'none'; resolve(-1); } }; }); }

function updatePartyStatus() { 
    const el = document.getElementById('party-status'); 
    el.innerHTML = partyData.members.map(m => { 
        let hpCol = '#fff'; if (m.hp <= m.max_hp / 3 || m.hp === 0) hpCol = '#f55'; else if (m.hp <= m.max_hp / 2) hpCol = '#fa0'; 
        let mpCol = '#fff'; if (m.max_mp > 0 && m.mp <= m.max_mp / 3) mpCol = '#f55'; else if (m.max_mp > 0 && m.mp <= m.max_mp / 2) mpCol = '#fa0';

function getAtk(char) {
    let atk = char.atk;
    if(char.equipment && char.equipment.weapon && masterData.items[char.equipment.weapon]) atk += masterData.items[char.equipment.weapon].power || 0;
    if(char.equipment && char.equipment.accessory && masterData.items[char.equipment.accessory]) {
        let acc = masterData.items[char.equipment.accessory];
        if(acc.effect === 'str_up') atk += 40;
    }
    return Math.max(0, atk);
}
function getDef(char) {
    let def = char.def;
    if(char.equipment) {
        if(char.equipment.armor && masterData.items[char.equipment.armor]) def += masterData.items[char.equipment.armor].power || 0;
        if(char.equipment.shield && masterData.items[char.equipment.shield]) def += masterData.items[char.equipment.shield].power || 0;
        if(char.equipment.helmet && masterData.items[char.equipment.helmet]) def += masterData.items[char.equipment.helmet].power || 0;
        if(char.equipment.accessory && masterData.items[char.equipment.accessory]) {
            let acc = masterData.items[char.equipment.accessory];
            if(acc.effect === 'atk_up_crit') return 0; // 魔神の指輪: 守備力0
            def += acc.power || 0;
        }
    }
    return Math.max(0, def);
}
function getSpd(char) {
    let spd = char.spd;
    if(char.equipment && char.equipment.accessory && masterData.items[char.equipment.accessory]) {
        let acc = masterData.items[char.equipment.accessory];
        if(acc.effect === 'speed_double' || acc.effect === 'agi_double') spd *= 2;
        else if(acc.effect === 'speed_up' || acc.id === 'acc_star_bracelet') spd += 50;
        else if(acc.effect === 'agi_up') spd += 30;
    }
    return Math.max(0, spd);
}

// ── 職業別装備制限 (DQスタイル) ──────────────────────────────
function canEquip(char, item) {
    if (!item || !char) return true;
    const job  = char.job || '';
    const type = item.type || '';
    const id   = item.id   || '';
    const name = item.name || '';

    // 遊び人(ネコ)は何でも装備可
    if (job === 'ネコ') return true;
    // アクセサリは全職業OK
    if (type === 'accessory') return true;

    // ─── 武器 ────────────────────────────────────────────────
    if (type === 'weapon') {
        const isSpear = id.startsWith('w_spear_') || /（槍）|ヤリ|スピア|ランス|さすまた|フォーク|ハルバード/.test(name);
        const isStaff = id.startsWith('w_staff_') || name.includes('（杖）') ||
                        ['w19','w25','w33','w36','w_2nd_06','w_2nd_07'].includes(id);
        const isClaw  = /（爪）|ツメ|ピアス/.test(name) || ['w17','w30'].includes(id);
        const isWhip  = /ムチ|（鞭）/.test(name) || ['w14','w32'].includes(id);
        const isAxe   = /カナヅチ|かなづち|斧|鉄球/.test(name) || ['w13','w26','w27','w35'].includes(id);
        const isKnife = /ナイフ|（短剣）/.test(name) || id === 'w16';
        const isBow   = /ボウ|（弓）/.test(name) || id === 'w08';
        const isClub  = /（棒）|棒きれ|こんぼう/.test(name) || ['w01','w02'].includes(id);
        const isCard  = /タロット|そろばん/.test(name) || ['w09','w22'].includes(id);

        if (isClub)  return true; // 棒/こんぼうは全員OK
        if (isSpear) return ['勇者','戦士','僧侶','パラディン'].includes(job);
        if (isStaff) return ['僧侶','魔法使い','賢者'].includes(job);
        if (isClaw)  return ['パンダ','忍者'].includes(job);
        if (isWhip)  return ['踊り子','魔法使い','賢者'].includes(job);
        if (isAxe)   return ['戦士','パラディン'].includes(job);
        if (isKnife) return ['忍者','踊り子','魔法使い','賢者'].includes(job);
        if (isBow)   return ['勇者','戦士','忍者'].includes(job);
        if (isCard)  return ['勇者','踊り子','賢者'].includes(job);
        // 剣・その他: 勇者/戦士/パラディン/サムライ/忍者
        return ['勇者','戦士','パラディン','サムライ','忍者'].includes(job);
    }

    // ─── 防具(鎧) ─────────────────────────────────────────────
    if (type === 'armor') {
        // 天空シリーズ・特定専用品
        if (id === 'a05' || id === 'a_grav_01') return job === '勇者';
        if (id === 'a_2nd_01') return ['勇者','戦士'].includes(job);
        if (id === 'a_2nd_02') return job === '戦士';
        if (id === 'a_2nd_03') return job === '僧侶';
        if (id === 'a_2nd_04') return job === '魔法使い';

        // 軽装/法衣系: 魔法使い/僧侶/賢者/踊り子/パンダ向け
        const isRobe = /法衣|ローブ|はごろも/.test(name) ||
                       /服|ドレス|ビキニ|レオタード/.test(name) ||
                       ['a01','a04','a07','a12','a17','a20','a22','a23','a24'].includes(id);
        // 重鎧: 勇者/戦士/パラディン専用
        const isHeavy = /ドラゴンメイル|あくまのよろい|厚手のよろい|刃のよろい|ミラーアーマー|メタルキング/.test(name) ||
                        ['a03','a08','a09','a10','a15','a18','a19','a21','a25','a26'].includes(id);

        if (isRobe)  return ['魔法使い','僧侶','賢者','踊り子','パンダ'].includes(job);
        if (isHeavy) return ['勇者','戦士','パラディン'].includes(job);
        // 中量鎧 (革/くさり/前掛け等): 魔法使い・踊り子は不可
        return !['魔法使い','踊り子','パンダ'].includes(job);
    }

    // ─── 盾 ──────────────────────────────────────────────────
    if (type === 'shield') {
        if (['魔法使い','踊り子','パンダ'].includes(job)) return false;
        if (['s03','s15'].includes(id)) return job === '勇者'; // 天空のたて
        if (id === 's_grav_01') return ['勇者','パラディン'].includes(job);
        if (id === 's_2nd_01')  return ['勇者','戦士'].includes(job);
        if (id === 's_2nd_02')  return job === '僧侶';
        if (id === 's_2nd_03')  return ['魔法使い','賢者'].includes(job); // 魔法盾は例外
        return true;
    }

    // ─── 兜/帽子 ─────────────────────────────────────────────
    if (type === 'helmet') {
        if (id === 'h04') return job === '勇者'; // 天空のかぶと
        if (id === 'h_grav_01') return ['勇者','パラディン'].includes(job);
        if (id === 'h_2nd_01')  return ['勇者','戦士'].includes(job);
        if (id === 'h_2nd_02')  return ['僧侶','魔法使い','賢者'].includes(job);
        // 重兜: 勇者/戦士/パラディン/サムライ
        const isHeavy = /かぶと|兜|てっかめん|グレートヘルム|メタルキング/.test(name) ||
                        ['h03','h05','h08','h12','h15'].includes(id);
        if (isHeavy) return ['勇者','戦士','パラディン','サムライ'].includes(job);
        // 知力の兜: 知力型向け
        if (id === 'h11') return ['勇者','戦士','魔法使い','賢者'].includes(job);
        return true; // 帽子・ぼうし系は全員OK
    }

    return true;
}

function calculateDamage(attacker, defender) {
    // metal_body: ダメージ上限1（はぐれグラちゃん等）
    if (defender.traits && defender.traits.includes('metal_body')) {
        return { isCritical: false, value: 1, isMetalBody: true };
    }
    let atkMod = attacker.tmpAtk > 0 ? 1.5 : attacker.tmpAtk < 0 ? 0.5 : 1.0;
    let defMod = defender.tmpDef > 0 ? 1.5 : defender.tmpDef < 0 ? 0.5 : 1.0;
    
    if (window.isGuraKingBattle && attacker.job) {
        atkMod *= 0.9;
    }
    
    const finalAttack = getAtk(attacker) * atkMod; const finalDefense = getDef(defender) * defMod;
    
    let criticalRate = 0.1;
    if (attacker.job === "忍者" || attacker.job === "踊り子") {
        criticalRate = 0.15;
    } else if (attacker.job === "パンダ" || attacker.job === "ネコ") {
        criticalRate = 0.1;
    }
    if (attacker.equipment && attacker.equipment.weapon === 'w13') criticalRate = 0.4; // まじんのカナヅチ
    if (attacker.equipment && attacker.equipment.accessory && masterData.items[attacker.equipment.accessory]?.effect === 'atk_up_crit') criticalRate = Math.min(0.8, criticalRate + 0.3);
    
    const isCritical = Math.random() < criticalRate && attacker.job;

    if (isCritical) {
        const critDmg = Math.floor(finalAttack * (0.9 + Math.random() * 0.2));
        return { isCritical: true, value: Math.max(1, critDmg) };
    } else {
        let baseDmg = Math.floor(finalAttack/2 - finalDefense/4) + Math.floor(Math.random()*2);
        return { isCritical: false, value: Math.max(1, baseDmg) };
    }
}

// Item 1: 敵攻撃 → 画面揺れ＋赤フラッシュ
function playEnemyAttackEffect(intensity = 1) {
    const container = document.getElementById('game-container');
    const ps = document.getElementById('party-status');
    // 赤フラッシュ (party-status)
    ps.style.transition = 'none';
    ps.style.background = `rgba(220,30,30,${0.5 + intensity * 0.2})`;
    setTimeout(() => { ps.style.transition = 'background 0.35s'; ps.style.background = ''; }, 80 + intensity * 40);
    // 画面揺れ (game-container)
    const amp = 4 * intensity, dur = 350 + intensity * 100;
    const start = Date.now();
    const shake = () => {
        const e = Date.now() - start;
        if (e < dur) {
            const decay = 1 - e / dur;
            const dx = (Math.random() - 0.5) * 2 * amp * decay;
            const dy = (Math.random() - 0.5) * amp * decay * 0.5;
            container.style.transform = `translate(${dx.toFixed(1)}px,${dy.toFixed(1)}px)`;
            requestAnimationFrame(shake);
        } else {
            container.style.transform = '';
        }
    };
    requestAnimationFrame(shake);
}

function updateTurnStatus(char) {
    if (char.tmpAtkDuration && char.tmpAtkDuration > 0) { char.tmpAtkDuration--; if (char.tmpAtkDuration <= 0) { char.tmpAtk = 0; } }
    if (char.tmpDefDuration && char.tmpDefDuration > 0) { char.tmpDefDuration--; if (char.tmpDefDuration <= 0) { char.tmpDef = 0; } }
    if (char.tmpSpdDuration && char.tmpSpdDuration > 0) { char.tmpSpdDuration--; if (char.tmpSpdDuration <= 0) { char.tmpSpd = 0; } }
    if (char.tmpSleep && char.tmpSleep > 0) char.tmpSleep--;
    if (char.tmpSilence && char.tmpSilence > 0) char.tmpSilence--;
    if (char.tmpBlind && char.tmpBlind > 0) char.tmpBlind--;
    if (char.tmpResist && char.tmpResist > 0) char.tmpResist--;
    if (char.tmpReflect && char.tmpReflect > 0) char.tmpReflect--;
}

// ===== NPC 徘徊システム =====
function _isWanderingNpc(id) {
    // 固定 NPC（店・教会・宿・ボス・ゲート・サブクエスト等）は動かさない
    if (!id) return false;
    const fixed = ['shop','priest','church','inn','boss','gate','casino','bunny',
                   'sub_smith','sub_richman','sub_mage','sub_rumor','class_change',
                   'npc_port','dharma_monk','shrine_priestess','dragon_spirit',
                   'story_advisor','pirate_sailor','guard_01','sky_guard',
                   'obj_chest','npc_tower','npc_maou','npc_sky','king'];
    return !fixed.some(f => id.includes(f));
}

function _isSafeMapForWander(mapId) {
    if (!mapId) return false;
    return mapId.includes('town') || mapId.includes('village') || mapId.includes('market') ||
           (mapId.includes('castle') && !mapId.includes('demon') && !mapId.includes('death'));
}

function initNpcWander() {
    npcWanderState = {};
    if (!currentMap || !currentMap.npcs) return;
    const mapId = partyData && partyData.pos ? partyData.pos.map : '';
    if (!_isSafeMapForWander(mapId)) return;
    for (const key of Object.keys(currentMap.npcs)) {
        const npc = currentMap.npcs[key];
        if (!_isWanderingNpc(npc.id)) continue;
        const [x, y] = key.split(',').map(Number);
        npcWanderState[key] = { homeX: x, homeY: y, id: npc.id, name: npc.name };
    }
}

function tickNpcWander() {
    if (state !== 'FIELD' && state !== 'MSG') return;
    const mapId = partyData && partyData.pos ? partyData.pos.map : '';
    if (!_isSafeMapForWander(mapId) || !currentMap || !currentMap.npcs) return;

    const SOLID = [1, 2, 4, 5, 15, 16, 17, 18, 19, 20];
    const RADIUS = 2;   // ホームから最大2タイルの範囲で徘徊
    const DIRS = [[0,1],[0,-1],[1,0],[-1,0]];
    const W = currentMap.width, H = currentMap.height;
    const px = partyData.pos.x, py = partyData.pos.y;

    // wander state のキーを現在の NPC 位置から再構築（キーが変わっている場合に対応）
    const curKeys = Object.keys(npcWanderState);
    for (const homeKey of curKeys) {
        const wdata = npcWanderState[homeKey];
        // 現在の NPC のキーを探す（最初はhomeKey、移動後は別のキー）
        let curKey = null;
        for (const k of Object.keys(currentMap.npcs)) {
            if (currentMap.npcs[k].id === wdata.id &&
                currentMap.npcs[k].name === wdata.name) {
                const [kx, ky] = k.split(',').map(Number);
                if (Math.abs(kx - wdata.homeX) <= RADIUS + 1 &&
                    Math.abs(ky - wdata.homeY) <= RADIUS + 1) { curKey = k; break; }
            }
        }
        if (!curKey) continue;

        // 50% でそのターンはスキップ（自然なランダム感）
        if (Math.random() < 0.5) continue;

        const [curX, curY] = curKey.split(',').map(Number);
        // ランダムな方向をシャッフル
        const dirs = [...DIRS].sort(() => Math.random() - 0.5);

        for (const [dx, dy] of dirs) {
            const nx = curX + dx, ny = curY + dy;
            if (nx < 1 || ny < 1 || nx >= W-1 || ny >= H-1) continue;
            // 半径チェック
            if (Math.abs(nx - wdata.homeX) > RADIUS || Math.abs(ny - wdata.homeY) > RADIUS) continue;
            const tile = currentMap.tiles[ny * W + nx];
            if (SOLID.includes(tile)) continue;
            const newKey = `${nx},${ny}`;
            if (currentMap.exits[newKey]) continue;
            if (currentMap.npcs[newKey]) continue;
            if (px === nx && py === ny) continue;  // プレイヤーと重ならない

            // 移動実行
            const npc = currentMap.npcs[curKey];
            delete currentMap.npcs[curKey];
            currentMap.npcs[newKey] = npc;
            break;
        }
    }
}

function getTileColor(t) { const colors = { 0:'#3a823f', 1:'#8b4513', 2:'#3366ff', 3:'#cccc00', 4:'#777777', 5:'#33ccff', 6:'#800080', 8:'#ff00ff', 9:'#c00', 10:'#d2b48c', 11:'#3a823f', 12:'#1a1', 13:'#e6cc80', 15:'#777', 16:'#aaa', 17:'#151', 18:'#d2d', 19:'#040', 20:'#432', 21:'#d55', 22:'#aaa', 23:'#cff' }; return colors[t] || '#000'; }
function drawSpriteLocal(ctx, img, px, py, targetHeight) { if (!img || !img.complete || img.naturalHeight === 0) return false; const ratio = img.width / img.height; const targetWidth = targetHeight * ratio; const offsetX = (TILE_SIZE - targetWidth) / 2; const offsetY = TILE_SIZE - targetHeight; ctx.drawImage(img, px + offsetX, py + offsetY, targetWidth, targetHeight); return true; }
function drawLargeSpriteLocal(ctx, img, px, py, targetWidth) { if (!img || !img.complete || img.naturalHeight === 0) return false; const ratio = img.height / img.width; const targetHeight = targetWidth * ratio; const offsetX = (TILE_SIZE - targetWidth) / 2; const offsetY = TILE_SIZE - targetHeight + 10; ctx.drawImage(img, px + offsetX, py + offsetY, targetWidth, targetHeight); return true; }
function _drawFieldBuilding(ctx, bType, px, py) {
    const T = TILE_SIZE, fl = Math.floor;
    ctx.save();
    if (bType === 'town') {
        // DQ4風 城壁付き城下町（壁+城門+3棟の屋根が見える）

        // 影
        ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fillRect(bx+5,py-fl(T*2.1)+5,bw,fl(T*2.1));
        // 石畳地面
        ctx.fillStyle='#9a8468'; ctx.fillRect(bx-2,py-3,bw+4,5);
        ctx.strokeStyle='#7a6448'; ctx.lineWidth=0.5;
        for(let sx=bx+6;sx<bx+bw-2;sx+=8){ctx.beginPath();ctx.moveTo(sx,py-3);ctx.lineTo(sx,py+2);ctx.stroke();}
        // 城壁（石積み）

        ctx.fillStyle='#c0b090'; ctx.fillRect(bx+1,wY-wH+1,wW-2,wH-2);
        ctx.strokeStyle='rgba(80,60,20,0.18)'; ctx.lineWidth=0.6;

        for(let gx=bx+9;gx<bx+wW;gx+=9){ctx.beginPath();ctx.moveTo(gx,wY-wH);ctx.lineTo(gx,wY);ctx.stroke();}
        // 城壁上の胸壁（凸凹）
        const merlonW=fl(wW/9), merlonH=5, merlonY=wY-wH;

        // 左右の塔（城壁より高い）
        [[bx-2,fl(T*0.45),fl(T*1.35)],[bx+wW-fl(T*0.45)+2,fl(T*0.45),fl(T*1.35)]].forEach(([tx,tw,th])=>{
            ctx.fillStyle='#9a9070'; ctx.fillRect(tx,wY-th,tw,th);

            ctx.strokeStyle='rgba(60,50,20,0.2)'; ctx.lineWidth=0.5;
            for(let gy=wY-th+5;gy<wY-wH;gy+=5){ctx.beginPath();ctx.moveTo(tx,gy);ctx.lineTo(tx+tw,gy);ctx.stroke();}
            for(let i=0;i<3;i++) ctx.fillRect(tx+i*fl(tw/3),wY-th-4,fl(tw/3)-1,5);

        });
        // 城門（アーチ型、中央）
        const gW=fl(T*0.72),gH=fl(T*0.74),gX=bx+fl((wW-gW)/2),gY=wY;
        const gaR=fl(gW/2),gaCY=gY-gH+gaR;

        ctx.beginPath();ctx.arc(gX+gaR,gaCY,gaR,Math.PI,0);ctx.rect(gX,gaCY,gW,gH-gaR);ctx.fill();
        // 城門の扉（左右分割）
        ctx.fillStyle='#4a2c10'; ctx.fillRect(gX+1,gaCY,fl(gW/2)-1,gH-gaR);
        ctx.fillStyle='#5a3818'; ctx.fillRect(gX+2,gaCY+3,fl(gW/2)-3,fl((gH-gaR)*0.38));
        ctx.fillStyle='#5c3810'; ctx.fillRect(gX+fl(gW/2)+1,gaCY,fl(gW/2)-2,gH-gaR);
        ctx.fillStyle='#6a4420'; ctx.fillRect(gX+fl(gW/2)+2,gaCY+3,fl(gW/2)-4,fl((gH-gaR)*0.38));
        ctx.fillStyle='#d09820'; ctx.fillRect(gX+fl(gW/2)-1,gaCY+fl((gH-gaR)*0.42),2,2);
        ctx.strokeStyle='#7a5030'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(gX+gaR,gaCY); ctx.lineTo(gX+gaR,gY); ctx.stroke();
        ctx.strokeStyle='#c0a060'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(gX+gaR,gaCY,gaR+1,Math.PI,0); ctx.stroke();
        // 城壁左右の窓

    } else if (bType === 'village') {
        // DQ4風 村（茅葺き屋根の小屋 2棟）

// DQ4風 扉グラフィック（ダンジョン・城の部屋間遷移ポイントに重ねて描画）
function _drawRoomDoor(ctx, px, py, mc) {
    const T = TILE_SIZE, fl = Math.floor;
    const { demon, cave, castle, tower, shrine } = mc;
    ctx.save();
    // 文脈別カラー
    const C = demon  ? { frm:'#1a0608', pnl:'#380c10', rib:'#580818', hng:'#800020', knb:'#c01830', hi:'#ff2040' }
            : cave   ? { frm:'#2a2018', pnl:'#4a3420', rib:'#5a4028', hng:'#484030', knb:'#a09060', hi:'#c8b880' }
            :          { frm:'#3c2c18', pnl:'#6a4828', rib:'#7a5838', hng:'#505050', knb:'#c0a040', hi:'#e8c860' };
    // 扉の寸法（タイルから少し上にはみ出す）
    const dW = fl(T*0.82), dH = fl(T*1.05);
    const dX = px + fl((T-dW)/2), dY = py - dH + fl(T*0.98);
    // 影
    ctx.fillStyle='rgba(0,0,0,0.30)'; ctx.fillRect(dX+3,dY+3,dW,dH);
    // 石枠（外）
    ctx.fillStyle=C.frm; ctx.fillRect(dX-2,dY-2,dW+4,dH+2);
    // 扉パネル
    ctx.fillStyle=C.pnl; ctx.fillRect(dX,dY,dW,dH);
    // 扉の光沢（左側面が少し明るい）
    ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.fillRect(dX,dY,fl(dW*0.28),dH);
    // 横リブ（2本）— 木目 or 金属補強
    const ribH=fl(T*0.07);
    [fl(dH*0.28), fl(dH*0.65)].forEach(ry=>{
        ctx.fillStyle=C.rib; ctx.fillRect(dX+2,dY+ry,dW-4,ribH);
        ctx.fillStyle='rgba(255,255,255,0.10)'; ctx.fillRect(dX+2,dY+ry,dW-4,1);
    });
    // 縦中央リブ
    ctx.fillStyle=C.rib; ctx.fillRect(dX+fl(dW/2)-1,dY+2,2,dH-4);
    // ヒンジ（左側、上下2か所）
    [fl(dH*0.18), fl(dH*0.72)].forEach(hy=>{
        ctx.fillStyle=C.hng; ctx.fillRect(dX-1,dY+hy,6,fl(T*0.12));
        ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fillRect(dX-1,dY+hy,6,1);
    });
    // ドアノブ（右寄り中央）
    const kX=dX+fl(dW*0.72), kY=dY+fl(dH*0.50);
    ctx.fillStyle=C.knb; ctx.beginPath(); ctx.arc(kX,kY,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.hi; ctx.beginPath(); ctx.arc(kX-1,kY-1,1.2,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=C.hng; ctx.lineWidth=1; ctx.strokeRect(dX-1,dY-1,dW+2,dH+1);
    // 魔王城：赤い装飾ライン
    if(demon){
        ctx.strokeStyle='rgba(180,20,20,0.6)'; ctx.lineWidth=0.8;
        ctx.strokeRect(dX+3,dY+3,dW-6,dH-6);
        ctx.fillStyle='rgba(200,30,30,0.4)'; ctx.beginPath(); ctx.arc(dX+fl(dW/2),dY+fl(dH*0.08),3,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawNpcSign(ctx, cx, ty, emoji, label, bgColor) {
    ctx.font = 'bold 7px sans-serif';
    let lw = ctx.measureText(label).width, ew = 11, pad = 3, h = 12, w = ew + lw + pad * 2;
    let rx = cx - w / 2, ry = ty - h - 26;
    ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(rx - 1, ry - 1, w + 2, h + 2);
    ctx.fillStyle = bgColor; ctx.fillRect(rx, ry, w, h);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 0.5; ctx.strokeRect(rx, ry, w, h);
    ctx.font = '9px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle'; ctx.fillStyle = '#fff';
    ctx.fillText(emoji, rx + 1, ry + h / 2);
    ctx.font = 'bold 7px sans-serif'; ctx.fillText(label, rx + ew, ry + h / 2);
}

function drawProceduralTile(ctx, tile, px, py, rand, now, mc, lights) {
    const T = TILE_SIZE;
    const { castle, town, cave, demon, tower, shrine } = mc;
    const fl = Math.floor;
    const fr = (c, rx, ry, rw, rh) => { ctx.fillStyle = c; ctx.fillRect(px + rx, py + ry, rw, rh); };
