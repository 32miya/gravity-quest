    if (tile === 11) { // 草 / 町ではDQスタイル草地
        if (town) {
            // DQスタイル: 緑ドット草地 + 丸い木
            let gc = rand < 0.3 ? '#2e6428' : rand > 0.7 ? '#3a7030' : '#346830';
            fr(gc, 0, 0, T, T);
            // 小ドットテクスチャ（DQらしい）
            ctx.fillStyle = 'rgba(20,70,10,0.55)';
            for (let di = 0; di < 14; di++) {
                ctx.fillRect(px + fl((rand * 11.3 + di * 3.7) % (T - 1)) + 0, py + fl((rand * 9.1 + di * 2.9) % (T - 1)) + 0, 1, 1);
            }
            ctx.fillStyle = 'rgba(80,140,40,0.3)';
            for (let di = 0; di < 6; di++) {
                ctx.fillRect(px + fl((rand * 7.8 + di * 5.2) % (T - 2)) + 1, py + fl((rand * 6.4 + di * 4.1) % (T - 2)) + 1, 2, 2);
            }
            // 丸い木（確率で描画）
            if (rand < 0.30) {
                fr('#5a3010', T/2 - 2, T - 10, 4, 8); // 幹
                ctx.fillStyle = '#1a4e0e'; ctx.beginPath(); ctx.arc(px + T/2, py + T/2, 11, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#266018'; ctx.beginPath(); ctx.arc(px + T/2 - 3, py + T/2 - 3, 8, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#307020'; ctx.beginPath(); ctx.arc(px + T/2 + 2, py + T/2 - 4, 7, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#3a7828'; ctx.beginPath(); ctx.arc(px + T/2, py + T/2 - 7, 5, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(10,40,5,0.45)';
                for (let di = 0; di < 9; di++) {
                    ctx.fillRect(px + fl((rand * 8.3 + di * 3.1) % 18) + T/2 - 9, py + fl((rand * 7.1 + di * 2.8) % 16) + T/2 - 12, 1, 1);
                }
            }
        } else {
            // DQ3スタイル鮮やか草地
            let gc = rand < 0.33 ? '#4caa28' : rand > 0.67 ? '#58bc34' : '#54b430';
            fr(gc, 0, 0, T, T);
            ctx.fillStyle = 'rgba(20,110,5,0.5)';
            for (let di = 0; di < 18; di++) ctx.fillRect(px + fl((rand * 13.7 + di * 3.3) % T), py + fl((rand * 11.3 + di * 2.7) % T), 1, 1);
            ctx.fillStyle = 'rgba(120,220,60,0.3)';
            for (let di = 0; di < 8; di++) ctx.fillRect(px + fl((rand * 8.9 + di * 5.1) % (T - 1)), py + fl((rand * 7.3 + di * 4.2) % (T - 1)), 2, 2);
            if (rand < 0.06) { fr('#f8ee80', fl(rand * 20) + 3, fl(rand * 20) + 3, 4, 4); fr('#ffe030', fl(rand * 20) + 4, fl(rand * 20) + 4, 2, 2); }
        }
    } else if (tile === 12) { // 背の高い草（DQ3スタイル）
        let gc2 = rand < 0.4 ? '#3a9820' : '#42a828';
        fr(gc2, 0, 0, T, T);
        ctx.fillStyle = 'rgba(15,100,5,0.55)';
        for (let di = 0; di < 16; di++) ctx.fillRect(px + fl((rand * 12.1 + di * 3.5) % T), py + fl((rand * 9.7 + di * 2.8) % T), 1, 1);
        ctx.fillStyle = '#4ab830';
        for (let i = 0; i < 7; i++) { let gx = fl((rand * 5.8 + i * 4.1) % (T - 3)) + 1; ctx.fillRect(px + gx, py + fl(rand * 3) + 3, 2, fl(rand * 4) + 9); }
    } else if (tile === 19) { // 森（DQ3スタイル丸い木）
        let gcf = rand < 0.4 ? '#4caa28' : '#54b430';
        fr(gcf, 0, 0, T, T);
        ctx.fillStyle = 'rgba(20,110,5,0.4)';
        for (let di = 0; di < 10; di++) ctx.fillRect(px + fl((rand * 11 + di * 4.1) % T), py + fl((rand * 9 + di * 3.3) % T), 1, 1);
        let treePairs = rand < 0.5 ? [[9, 19, 9], [22, 17, 8]] : [[7, 17, 8], [22, 20, 9]];
        treePairs.forEach(([tx2, ty2, tr]) => {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.arc(px + tx2 + 1, py + ty2 + 2, tr, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#1a5a08'; ctx.beginPath(); ctx.arc(px + tx2, py + ty2, tr, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#246c10'; ctx.beginPath(); ctx.arc(px + tx2 - 1, py + ty2 - 2, tr - 2, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'rgba(80,180,30,0.25)'; ctx.beginPath(); ctx.arc(px + tx2 - 2, py + ty2 - 3, tr - 4, 0, Math.PI*2); ctx.fill();
        });
    } else if (tile === 20) { // 山（DQ3スタイル小さな丘）
        let gcm = rand < 0.4 ? '#4caa28' : '#54b430';
        fr(gcm, 0, 0, T, T);
        ctx.fillStyle = 'rgba(20,110,5,0.4)';
        for (let di = 0; di < 10; di++) ctx.fillRect(px + fl((rand * 11 + di * 3.9) % T), py + fl((rand * 9 + di * 3.1) % T), 1, 1);
        let mts = rand < 0.5 ? [[6, 26, 7, 6], [18, 24, 8, 7], [27, 27, 5, 4]] : [[4, 25, 6, 5], [15, 23, 9, 7], [25, 26, 6, 5]];
        mts.forEach(([mx, my, mw, mh]) => {
            ctx.fillStyle = '#8a7848'; ctx.beginPath(); ctx.moveTo(px+mx-mw, py+my); ctx.lineTo(px+mx, py+my-mh); ctx.lineTo(px+mx+mw, py+my); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#a08c5a'; ctx.beginPath(); ctx.moveTo(px+mx-mw+2, py+my-1); ctx.lineTo(px+mx, py+my-mh+2); ctx.lineTo(px+mx+mw-2, py+my-1); ctx.closePath(); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.18)'; ctx.beginPath(); ctx.moveTo(px+mx-1, py+my-mh+1); ctx.lineTo(px+mx, py+my-mh); ctx.lineTo(px+mx+2, py+my-mh+2); ctx.closePath(); ctx.fill();
        });
    } else if (tile === 5) { // 水（DQ3スタイル明るい青）
        let w1 = Math.sin(now / 700 + rand * 3.1) * 2, w2 = Math.sin(now / 950 + rand * 5.3 + 1) * 2;
        fr('#1878d8', 0, 0, T, T); fr('#2090e8', 0, fl(5 + w1), T, 7); fr('#28a8f8', 2, fl(13 + w2), T - 4, 6);
        fr('rgba(255,255,255,0.55)', fl(2 + rand * 8), fl(5 + w1), 10, 2); fr('rgba(255,255,255,0.38)', fl(14 + rand * 9), fl(15 + w2), 8, 2);
        fr('rgba(255,255,255,0.2)', fl(8 + rand * 6), fl(24 + w1), 7, 1);
    } else if (tile === 0 || tile === 23) {
        if (tile === 23) {
            // 七色の水の渦巻きアニメーション
            const _vc = px + T/2, _vcy = py + T/2, _vr = T/2 - 0.5;
            ctx.save();
            ctx.beginPath(); ctx.arc(_vc, _vcy, _vr, 0, Math.PI * 2); ctx.clip();
            ctx.fillStyle = '#050215'; ctx.fillRect(px, py, T, T);
            const _vcl = ['#ff2222','#ff8800','#ffee00','#22ee55','#2288ff','#6622dd','#cc22ff'];
            const _vrot = (now / 850) % (Math.PI * 2);
            ctx.lineWidth = 2.4;
            for (let _va = 0; _va < 7; _va++) {
                const _bang = _vrot + (_va / 7) * Math.PI * 2;
                ctx.beginPath(); ctx.strokeStyle = _vcl[_va]; ctx.globalAlpha = 0.9;
                for (let _vs = 0; _vs <= 14; _vs++) {
                    const _vt = _vs / 14;
                    const _ang = _bang + _vt * Math.PI * 2.5;
                    const _vrad2 = _vt * _vr * 0.93;
                    const _vx = _vc + Math.cos(_ang) * _vrad2, _vy = _vcy + Math.sin(_ang) * _vrad2;
                    _vs === 0 ? ctx.moveTo(_vx, _vy) : ctx.lineTo(_vx, _vy);
                }
                ctx.stroke();
            }
            ctx.globalAlpha = 1;
            const _vg = ctx.createRadialGradient(_vc, _vcy, 0, _vc, _vcy, _vr * 0.45);
            _vg.addColorStop(0, 'rgba(255,255,255,0.92)'); _vg.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = _vg; ctx.fillRect(px, py, T, T);
            ctx.restore();
        } else if (town) {
            // DQスタイル赤レンガ道路
            fr('#561410', 0, 0, T, T); // 目地（暗い赤褐色）
            let bcs = ['#8c3028','#963828','#843020','#9e3c30'];
            for (let row = 0; row < 4; row++) {
                let off = row % 2 === 0 ? 0 : 4;
                let by2 = row * 8 + 1;
                for (let col = 0; col < 5; col++) {
                    let bx2 = col * 8 + off;
                    if (bx2 >= T) break;
                    let bw2 = Math.min(7, T - bx2 - 1);
                    if (bw2 <= 0) break;
                    let bc = bcs[(fl(rand * 3) + row + col) % 4];
                    fr(bc, bx2, by2, bw2, 6);
                    fr('rgba(255,255,255,0.18)', bx2, by2, bw2, 1);
                    fr('rgba(0,0,0,0.22)', bx2, by2 + 5, bw2, 1);
                }
            }
            // 汚れ（たまに）
            if (rand < 0.08) fr('rgba(0,0,0,0.15)', fl(rand*16)+2, fl(rand*16)+2, 3, 2);
        } else if (castle || tower || shrine) {
            let ev = (fl(px / T) + fl(py / T)) % 2;
            fr(ev ? '#8898a8' : '#9aaabe', 0, 0, T, T);
            ctx.strokeStyle = 'rgba(60,80,100,0.35)'; ctx.lineWidth = 0.7; ctx.strokeRect(px + 1, py + 1, T - 2, T - 2);
        } else if (demon) {
            fr('#271230', 0, 0, T, T); fr('#311838', 4, 4, T - 8, T - 8);
            if (rand < 0.07) { ln('#7722bb', 1, fl(rand * T), 0, fl((1 - rand) * T), T); ctx.strokeStyle = 'rgba(100,20,180,0.22)'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(px + fl(rand * T), py); ctx.lineTo(px + fl((1 - rand) * T), py + T); ctx.stroke(); }
        } else if (cave) {
            fr('#373340', 0, 0, T, T); fr('#413d4c', 3, 3, T - 6, T - 6);
            if (rand < 0.08) fr('rgba(0,0,0,0.35)', fl(rand * (T - 8)) + 2, fl(rand * (T - 6)) + 2, fl(rand * 4) + 4, fl(rand * 2) + 3);
        } else {
            // Field sand/desert (DQ3 style)
            let sc = rand < 0.35 ? '#c4ba6c' : rand > 0.65 ? '#d0c47e' : '#c8be78';
            fr(sc, 0, 0, T, T);
            ctx.fillStyle = 'rgba(180,160,40,0.35)';
            for (let di = 0; di < 12; di++) ctx.fillRect(px+fl((rand*11.3+di*3.7)%T), py+fl((rand*9.1+di*2.9)%T), 1, 1);
            ctx.fillStyle = 'rgba(255,240,180,0.2)';
            for (let di = 0; di < 5; di++) ctx.fillRect(px+fl((rand*7.8+di*5.2)%(T-2))+1, py+fl((rand*6.4+di*4.1)%(T-2))+1, 2, 2);
        }
    } else if (tile === 1 || tile === 4) {
        if (town) {
            // DQスタイルグレー石壁
            fr('#404040', 0, 0, T, T); // 目地（暗いグレー）
            let gsc = ['#787878','#6e6e6e','#747474','#666666','#717171'];
            for (let row = 0; row < 4; row++) {
                let off = (row % 2) * 8;
                let by2 = row * 8 + 1;
                for (let col = -1; col <= 2; col++) {
                    let bx2 = col * 16 + off;
                    let x1 = Math.max(0, bx2), x2 = Math.min(T, bx2 + 14);
                    if (x2 <= x1) continue;
                    let bc = gsc[(fl(rand * 4) + row * 2 + col + 8) % 5];
                    fr(bc, x1, by2, x2 - x1, 6);
                    fr('rgba(255,255,255,0.15)', x1, by2, x2 - x1, 1);
                    fr('rgba(0,0,0,0.18)', x1, by2 + 5, x2 - x1, 1);
                }
            }
            // たまにドアや看板
            if (rand > 0.88) {
                fr('#6a3a10', T/2 - 5, T - 14, 10, 13);
                fr('#8a5020', T/2 - 4, T - 13, 8, 11);
                fr('#e8c060', T/2 - 1, T - 10, 2, 2);
            } else if (rand > 0.76) {
                fr('#3a2008', 4, 8, 24, 2);
                fr('#c07030', 4, 10, 24, 12);
                fr('#e8e070', 6, 12, 20, 8);
                ctx.fillStyle = '#3a1400'; ctx.font = 'bold 5px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('INN', px + T/2, py + 16);

        } else if (castle || tower) {
            fr('#3f5060', 0, 0, T, T);
            fr('#506070', 1, 1, T / 2 - 2, T / 2 - 2); fr('#4a5c6c', T / 2 + 1, 1, T / 2 - 2, T / 2 - 2);

            if (rand > 0.84) {
                fr('#a00', 8, 3, 16, 20); fr('#da0', 8, 23, 5, 4); fr('#da0', 14, 25, 4, 4); fr('#da0', 20, 23, 4, 4); fr('#da0', 14, 9, 4, 8); fr('#da0', 10, 11, 12, 4);

        } else if (demon) {

            ctx.strokeStyle = '#aa33ff'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(px + cx2, py + cy2); ctx.lineTo(px + cx2 + len, py + cy2 + fl(rand * 10) + 7); ctx.stroke();
            ctx.strokeStyle = 'rgba(150,40,255,0.22)'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(px + cx2, py + cy2); ctx.lineTo(px + cx2 + len, py + cy2 + fl(rand * 10) + 7); ctx.stroke();
            if (rand > 0.87) {
                ctx.fillStyle = '#a020f0'; ctx.beginPath(); ctx.arc(px + 16, py + 6, 5, 0, Math.PI * 2); ctx.fill();

            }
        } else if (cave) {
            fr('#201e2c', 0, 0, T, T); fr('#2a2835', 1, 0, T - 2, 5); fr('#1a1826', 1, 5, T - 2, T - 6);
            if (rand < 0.22) fr('#343042', fl(rand * 14) + 2, fl(rand * 8) + 4, fl(rand * 4) + 4, fl(rand * 3) + 3);
            if (rand < 0.09) {
                fr('#302', 12, 10, 8, 14); fr('#100', 10, 8, 12, 4);
                ctx.fillStyle = '#f50'; ctx.beginPath(); ctx.arc(px + 16, py + 6, 5, 0, Math.PI * 2); ctx.fill();

async function _tgFade(isOut) {
    const gc = document.getElementById('game-container'); if (!gc) return;
    if (!_tgOv) {
        _tgOv = document.createElement('canvas');
        _tgOv.style.cssText = 'display:none;position:absolute;top:0;left:0;width:100%;height:100%;z-index:90;pointer-events:none;';

    const c = _tgOv.getContext('2d');
    const cx = W/2, cy = H/2, maxR = Math.hypot(cx, cy) + 20;
    const cols = ['#ff2222','#ff8800','#ffee00','#22ee55','#2288ff','#6622dd','#cc22ff'];
    const dur = isOut ? 500 : 440;
    const t0 = performance.now();

            const p = isOut ? t : 1 - t;

                    const ba = rot + (a/7)*Math.PI*2;
                    c.beginPath(); c.strokeStyle = cols[a]; c.globalAlpha = 0.85;
                    for (let s = 0; s <= 20; s++) {
                        const st = s/20, ang = ba + st*Math.PI*3, rr = st*r*0.95;
                        const x = cx+Math.cos(ang)*rr, y = cy+Math.sin(ang)*rr;
                        s===0 ? c.moveTo(x,y) : c.lineTo(x,y);
                    }
                    c.stroke();

                c.globalAlpha = 1;
                if (r > 30) {
                    const cg = c.createRadialGradient(cx, cy, 0, cx, cy, Math.min(r*0.35, 90));
                    cg.addColorStop(0, 'rgba(255,255,255,0.7)'); cg.addColorStop(1, 'rgba(0,0,0,0)');

                if (isOut) { c.fillStyle = '#030112'; c.fillRect(0, 0, W, H); }

            }
        }
        requestAnimationFrame(frame);
    });
}

                    partyData.members.forEach(m => { m.lv = 25; m.exp = 99999; if (masterData.growth && masterData.growth[m.job]) { let gt = masterData.growth[m.job]; let lvD = gt.find(g => g.level === 25) || gt[gt.length-1]; if(lvD) { m.max_hp=lvD.hp; m.max_mp=lvD.mp; m.atk=lvD.atk; m.def=lvD.def; m.spd=lvD.spd; m.hp=m.max_hp; m.mp=m.max_mp; m.spells=[]; for(let lvl=1; lvl<=25; lvl++) { let d = gt.find(g => g.level === lvl); if(d?.learnMagic) { d.learnMagic.forEach(name => { const fd = Object.values(masterData.spells).find(s => s.name === name); if(fd && !m.spells.includes(fd.id)) m.spells.push(fd.id); }); } } } } });
                    for(let i=0; i<partyData.members.length; i++) { let m = partyData.members[i]; let input = await showCustomDialog('prompt', `${m.job} の名前を決めてください\n空白で「${m.name}」`, m.name); if(input !== null && input.trim() !== "") m.name = input.trim().substring(0, 4); }
                    await showCustomDialog('alert', "【裏技成功】\n全員の レベルが25 の状態で\n始まります！"); break;
                }
                else if(pwd === "ようきな壺") {
                    partyData = await loadExternalData('party'); partyData.flags = { none: true }; if(externalMapData) { partyData.pos.map = externalMapData['map_town_01'] ? 'map_town_01' : Object.keys(externalMapData)[0]; partyData.pos.x = 10; partyData.pos.y = 18; } applyGrowthDataToParty(true); partyData.gold = 10000;
                    for(let i=0; i<partyData.members.length; i++) { let m = partyData.members[i]; let input = await showCustomDialog('prompt', `${m.job} の名前を決めてください\n空白で「${m.name}」`, m.name); if(input !== null && input.trim() !== "") m.name = input.trim().substring(0, 4); }
                    await showCustomDialog('alert', "【裏技成功】\n所持金が 10000G の状態で\n始まります！"); break;
                }
                else if(pwd === "人生五十年") { await startSecondLoop(null); break; }
                else if(pwd !== "") {
                    let unpacked = unpackSaveData(pwd);
                    if (unpacked) {
                        if (unpacked.type === 'clear') { await startSecondLoop(unpacked.data); break; } 
                        else { partyData = unpacked.data; applyGrowthDataToParty(false); await showCustomDialog('alert', "ふっかつのじゅもん が\n受け入れられました！"); break; }
                    } else { await showCustomDialog('alert', "じゅもん が ちがいます！"); }
                }
            }
        }
        else if(choiceStr === 'ぼうけんのしょを消す') {
            let conf = await showCustomDialog('confirm', "本当に ぼうけんのしょ（セーブデータ）を\n消してもよろしいですか？\n（この操作は取り消せません）");
            if(conf) { localStorage.removeItem('gravity_quest_save'); await showCustomDialog('alert', "ぼうけんのしょ は\n完全に消し去られました。"); }
        }
    }
    document.getElementById('title-screen').style.display = 'none';
    currentMap = await loadExternalData('map-' + partyData.pos.map);
    state = 'FIELD'; drawMap(); updateBGM();
}

setInterval(() => { if (state === 'FIELD' || state === 'MSG') drawMap(); }, 100);
</script>

<script>
// ═══ STANDALONE OVERRIDE: init() — 外部fetchなしで全DB適用 ═══
window.onload = null; // 元の onload を解除
let _loadPct = 0;
function _animLoad() {
    const _lo = document.getElementById('loading-overlay');
    if (!_lo || _lo.style.display === 'none') return;
    const _lt = document.getElementById('loading-text');
    if (_lt) { const _d = '.'.repeat((Math.floor(Date.now() / 350) % 3) + 1); _lt.textContent = 'loading' + _d + ' ' + Math.floor(_loadPct) + '%'; }
    requestAnimationFrame(_animLoad);
}

async function init() {
    resizeCanvas();
    masterData = await loadExternalData('master');

    // アイテムDB
    if (window.ITEM_DATABASE) {
        const db = window.ITEM_DATABASE;
        (db.weapons||[]).forEach(w => masterData.items[w.id] = {id:w.id,name:w.name,type:'weapon',price:w.price,power:w.attack,desc:w.description});
        (db.armors||[]).forEach(a => masterData.items[a.id] = {id:a.id,name:a.name,type:'armor',price:a.price,power:a.defense,desc:a.description});
        (db.shields||[]).forEach(s => masterData.items[s.id] = {id:s.id,name:s.name,type:'shield',price:s.price,power:s.defense,desc:s.description});
        (db.helmets||[]).forEach(h => masterData.items[h.id] = {id:h.id,name:h.name,type:'helmet',price:h.price,power:h.defense,desc:h.description});
        (db.accessories||[]).forEach(x => masterData.items[x.id] = {id:x.id,name:x.name,type:'accessory',price:x.price,power:x.defense||0,effect:x.effect,desc:x.description});
        (db.items||[]).forEach(i => masterData.items[i.id] = {id:i.id,name:i.name,type:'tool',price:i.price,effect:i.effect,value:i.value,desc:i.description});
    }
    // 魔法DB
    if (window.MAGIC_DATABASE) {
        window.MAGIC_DATABASE.forEach(m => {
            masterData.spells[m.id] = {id:m.id,name:m.name,type:m.type,target:m.target,mp:m.mp_cost,value:m.power,desc:m.description,element:m.element};
        });
    }
    // モンスターDB
    if (window.MONSTER_DATABASE) {
        window.MONSTER_DATABASE.forEach(m => {
            masterData.monsters[m.id] = {name:m.name,max_hp:m.hp,atk:m.attack,def:m.defense,spd:m.speed,exp:m.exp,gold:m.gold};
            if (m.image && m.image.startsWith('http')) {
                let img = new Image(); img.crossOrigin = "Anonymous"; img.src = m.image;
                externalImages['enemy_' + m.id] = img;
            }
        });
        if (masterData.monsters['slime']) masterData.monsters['m01'] = masterData.monsters['slime'];
        if (masterData.monsters['ghost']) masterData.monsters['m02'] = masterData.monsters['ghost'];
        if (externalImages['enemy_slime']) externalImages['enemy_m01'] = externalImages['enemy_slime'];
        if (externalImages['enemy_ghost']) externalImages['enemy_m02'] = externalImages['enemy_ghost'];
    }
    // 成長DB
    if (window.EXT_GROWTH) {
        const ext = window.EXT_GROWTH;
        masterData.growth = {};
        (ext.characterData || []).forEach(char => {
            masterData.growth[char.job] = char.growth;
            if (char.sprites) {
                const li = (src) => { if (!src) return null; let img = new Image(); img.src=src; img.onload = () => { if (state === 'FIELD' || state === 'MSG') drawMap(); }; return img; };
                const _liD = li(char.sprites.down); if (_liD) externalImages['sprite_' + char.id + '_down'] = _liD;
                const _liU = li(char.sprites.up); if (_liU) externalImages['sprite_' + char.id + '_up'] = _liU;
                const _liL = li(char.sprites.left); if (_liL) externalImages['sprite_' + char.id + '_left'] = _liL;
            }
        });
    }
    // 音楽DB
    if (window.SOUND_DATABASE) { AudioManager.db = window.SOUND_DATABASE; AudioManager.preloadAllBGMs(); }
    // 2周目モンスターDB
    if (window.SL_MONSTER_DATABASE) {
        window.SL_MONSTER_DATABASE.forEach(m => {
            let mId = "sl_m_" + m.id;
            let hp = parseInt(m.hp) || 500;
            masterData.monsters[mId] = {
                name: m.name,
                max_hp: Math.ceil(hp / 2),
                atk: Math.min(120, 30 + Math.floor(hp / 30)),
                def: Math.min(60,  15 + Math.floor(hp / 60)),
                spd: Math.min(80,  20 + Math.floor(hp / 50)),
                exp: Math.floor(hp), gold: Math.floor(hp / 2)
            };
            if (m.img) { let img = new Image(); img.crossOrigin="Anonymous"; img.src=m.img; externalImages['enemy_' + mId] = img; }
        });
    }

    showTitleScreen();
}
window.onload = init;
</script>
