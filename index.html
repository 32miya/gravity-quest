            sage: { 2: ["ホイム"], 5: ["メラン"], 16: ["ヒャドン"], 18: ["バギス"], 21: ["ベホイム"], 25: ["ギラン"], 27: ["メラミィ"], 29: ["ヒャダイン"], 31: ["ザオラル"], 33: ["ベギラン"], 35: ["ライデン"], 38: ["ベホマラ"] },
            paladin: { 5: ["スカラー"], 18: ["ホイム"], 28: ["マヌーサ"], 40: ["ザオーン"] },
            jester: { 16: ["トヘロ"], 27: ["ルーラ"], 39: ["レミト"] },
            samurai: {},
            dancer: { 2: ["マヌーサ"], 21: ["ルカン"], 36: ["ベホマラ"] },
            ninja: { 5: ["メラン"], 16: ["ヒャドン"], 25: ["バギス"], 37: ["バイキル"] }
        };

        // --- 成長テーブル生成 (URLと同じカーブ計算) ---
        function getStat(min, max, level) {
            const ratio = (level - 1) / 98;
            const curve = Math.pow(ratio, 0.95);
            return Math.floor(min + (max - min) * curve);
        }

        characterData.forEach(char => {
            const stats = baseStats[char.id];
            const magic = magicTable[char.id];
            
            for (let L = 1; L <= 99; L++) {
                let reqExp = 0;
                if (L > 1) {
                    const x = L - 1;
                    reqExp = Math.floor(15 * x + 2 * Math.pow(x, 2) + 1.5 * Math.pow(x, 3));
                }

                char.growth.push({
                    level: L, reqExp: reqExp,
                    hp: getStat(stats.hp[0], stats.hp[1], L), mp: getStat(stats.mp[0], stats.mp[1], L),
                    atk: getStat(stats.atk[0], stats.atk[1], L), def: getStat(stats.def[0], stats.def[1], L), spd: getStat(stats.spd[0], stats.spd[1], L),
                    learnMagic: magic[L] || []
                });
            }
        });

        // --- UI初期化と描画処理 ---
        const tabContainer = document.getElementById('tab-container');
        const tbody = document.getElementById('growth-table-body');

        function initTabs() {
            characterData.forEach((char, index) => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.innerText = char.job;
                btn.onclick = () => selectCharacter(index);
                tabContainer.appendChild(btn);
            });
        }

        function selectCharacter(index) {
            const btns = tabContainer.querySelectorAll('.tab-btn');
            btns.forEach((btn, i) => {
                if(i === index) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            const data = characterData[index];

            document.getElementById('val-id').innerText = data.id;
            document.getElementById('val-name').innerText = data.defaultName;
            document.getElementById('val-job').innerText = data.job;
            document.getElementById('val-gender').innerText = data.gender;
            document.getElementById('val-weapons').innerText = data.weapons; 

            // 画像プレビューの更新
            const imgUp = document.getElementById('img-spr-up');
            const imgDown = document.getElementById('img-spr-down');
            const imgLeft = document.getElementById('img-spr-left');
            const imgRight = document.getElementById('img-spr-right');
            const descLeft = document.getElementById('desc-spr-left');
            const descRight = document.getElementById('desc-spr-right');

            imgUp.src = data.sprites.up;
            imgDown.src = data.sprites.down;
            imgLeft.src = data.sprites.left;
            imgRight.src = data.sprites.right;

            // 表示位置や反転のリセット
            imgLeft.style.transform = "none";
            imgRight.style.transform = "none";
            imgUp.style.transform = "none";
            imgDown.style.transform = "none";
            descLeft.style.display = "none";
            descRight.style.display = "none";

            // 左右の画像URLが同じ場合、元画像がどちらを向いているかで反転先を決定する
            if(data.sprites.right === data.sprites.left && !data.sprites.right.startsWith("img/")) {
                if (data.baseFacing === "right") {
                    imgLeft.style.transform = "scaleX(-1)";
                    descLeft.style.display = "block";
                } else {
                    imgRight.style.transform = "scaleX(-1)";
                    descRight.style.display = "block";
                }
            }

            // 僧侶の中央化微調整
            if (data.id === "priest") {
                imgDown.style.transform = "translateX(-15%) scale(1.1)"; 
                imgUp.style.transform = "translateX(15%) scale(1.1)"; 
            }

            // テーブルの更新
            tbody.innerHTML = '';
            data.growth.forEach(g => {
                const tr = document.createElement('tr');
                if (g.level === 40) tr.className = 'clear-level';
                
                tr.innerHTML = `
                    <td>${g.level}</td>
                    <td>${g.reqExp}</td>
                    <td>${g.hp}</td>
                    <td>${g.mp}</td>
                    <td>${g.atk}</td>
                    <td>${g.def}</td>
                    <td>${g.spd}</td>
                    <td class="magic-cell">${g.learnMagic.length > 0 ? g.learnMagic.join(', ') : '-'}</td>
                `;
                tbody.appendChild(tr);
            });
            
            document.querySelector('.table-responsive').scrollTop = 0;
        }

        if (document.getElementById('tab-container')) {
            initTabs();
            selectCharacter(8);
        }
window.EXT_GROWTH = { characterData, baseStats, magicTable };
</script>

function packSaveData(pData) {
    let minObj = {
        g: pData.gold,
        p: [pData.pos.map.replace('map_',''), pData.pos.x, pData.pos.y],
        f: Object.keys(pData.flags||{}).filter(k => pData.flags[k] === true),
        c: pData.members.map(mb => [
            mb.name, mb.job, mb.lv, mb.exp,
            mb.equipment.weapon||"", mb.equipment.armor||"", mb.equipment.shield||"", mb.equipment.helmet||"", mb.equipment.accessory||"",
            mb.inventory.join(','), mb.spells.join(',')
        ])
    };
    return btoa(encodeURIComponent(JSON.stringify(minObj)));
}

function unpackSaveData(pwd) {
    pwd = pwd.replace(/\s+/g, '');
    let decoded;
    try { decoded = decodeURIComponent(atob(pwd)); } catch(e) { return null; }
    if (decoded.startsWith("CLEAR_")) { let inner = decoded.substring(6); return { type: 'clear', data: JSON.parse(inner) }; }
    let obj; try { obj = JSON.parse(decoded); } catch(e) { return null; }
    if (obj.members && obj.pos) return { type: 'normal', data: obj }; 
    let flags = {}; if (obj.f) obj.f.forEach(k => flags[k] = true);
    let members = obj.c.map(mb => {
        let bs = { hp: 50, max_hp: 50, mp: 20, max_mp: 20, atk: 10, def: 10, spd: 10 };
        if (masterData && masterData.growth && masterData.growth[mb[1]]) {
            let g = masterData.growth[mb[1]].find(g => g.level === mb[2]);
            if (g) bs = { hp: g.hp, max_hp: g.hp, mp: g.mp||0, max_mp: g.mp||0, atk: g.atk||10, def: g.def||10, spd: g.spd||10 };
        }
        return {
            id: "p" + Math.random(), name: mb[0], job: mb[1], lv: mb[2], exp: mb[3],
            ...bs,
            equipment: { weapon: mb[4]||null, armor: mb[5]||null, shield: mb[6]||null, helmet: mb[7]||null, accessory: mb[8]||null },
            inventory: mb[9] ? mb[9].split(',') : [],
            spells: mb[10] ? mb[10].split(',') : []
        };
    });
    let mapName = obj.p[0];
    if(!mapName.startsWith('map_') && !mapName.includes('town') && !mapName.includes('castle') && !mapName.includes('dungeon')) mapName = 'map_' + mapName;
    else if (!mapName.startsWith('map_')) mapName = 'map_' + mapName;
    let pData = { gold: obj.g||0, steps_to_encounter: 15, tohero_steps: 0, tramana_steps: 0, members: members, flags: flags, pos: { map: mapName, x: obj.p[1], y: obj.p[2] }, dir: 2 };
    return { type: 'normal', data: pData };
}

    // Tier (spell power) detection: 1=weak, 2=medium, 3=strong, 4=ultimate
    let tier = 1;
    if (sval >= 200 || (spellData.mp || 0) >= 28 || /zun$|zoma$|mahyado|gon$|kuro$|naz$|zaorn$|deinn$|min$|ultima/.test(sid)) tier = 4;
    else if (sval >= 100 || (spellData.mp || 0) >= 16 || /ra$|zon$|don$|behoma$|behoima$|begirama$/.test(sid)) tier = 3;
    else if (sval >= 40 || (spellData.mp || 0) >= 7 || /mi$|ma$|daruko|darko|behoimi$|imi$/.test(sid)) tier = 2;

    // Element detection
    let etype = 'generic';
    if (stype === 'heal' || /hoi|beho|zaorn|kiari|shana/.test(sid) || (sid.includes('zao') && !sid.includes('zaorn'))) etype = 'heal';
    else if (elem === 'fire' || sid.includes('mera')) etype = 'fire';
    else if (elem === 'ice' || sid.includes('hya')) etype = 'ice';
    else if (elem === 'lightning' || sid.includes('gira') || sid.includes('begi')) etype = 'lightning';
    else if (elem === 'wind' || sid.includes('bagi')) etype = 'wind';
    else if (sid.includes('io') || elem === 'explosion') etype = 'explosion';
    else if (sid.includes('doru') || sid.includes('dol') || elem === 'dark') etype = 'dark';
    else if (stype === 'buff') etype = 'buff';
    else if (stype === 'debuff' || stype === 'status') etype = 'debuff';
    else if (stype === 'field' || sid.includes('rula') || sid.includes('remi') || sid.includes('tohe')) etype = 'warp';

    // Canvas setup
    const gc = document.getElementById('game-container');
    const W = gc.offsetWidth || 360, H = gc.offsetHeight || 560;
    const cvs = document.createElement('canvas');
    cvs.width = W; cvs.height = H;
    Object.assign(cvs.style, {position:'absolute',top:'0',left:'0',width:'100%',height:'100%',pointerEvents:'none'});
    layer.appendChild(cvs);
    const ctx = cvs.getContext('2d');

    const isEnemy = targetObj === 'enemies' || stype === 'attack' || stype === 'debuff' || stype === 'status';
    const tcx = W * 0.5, tcy = isEnemy ? H * 0.35 : H * 0.65;
    const dur = [700, 900, 1100, 1400][tier - 1];
    const N = [18, 30, 50, 75][tier - 1];

    // Screen shake for powerful spells
    if (tier >= 3 && (etype === 'explosion' || etype === 'lightning' || etype === 'fire' || etype === 'dark')) {
        let sk = 0, maxSk = tier === 4 ? 8 : 5;
        const gcEl = gc;
        const iv = setInterval(() => {
            sk++;
            gcEl.style.transform = sk % 2 === 0 ? `translate(${(Math.random()-0.5)*8}px,${(Math.random()-0.5)*5}px)` : 'none';
            if (sk >= maxSk) { clearInterval(iv); gcEl.style.transform = 'none'; }
        }, 60);
    }

    // Deterministic per-particle RNG (stable across frames)
    const rng = (s) => { let x = ((s + 1) * 1664525 + 1013904223) & 0x7fffffff; return x / 0x7fffffff; };
    const parts = Array.from({length: N}, (_, i) => ({
        angle: rng(i*7+1) * Math.PI * 2,
        spd: 0.5 + rng(i*7+2) * 0.5,
        phase: rng(i*7+3) * 0.25,
        size: 0.5 + rng(i*7+4) * 0.5,
        hue: rng(i*7+5),
        wobble: (rng(i*7+6) - 0.5) * 2,
    }));

    const clearGlow = () => { ctx.shadowBlur = 0; ctx.shadowColor = 'transparent'; };
    const rg = (cx,cy,r,c1,c2) => { const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r); g.addColorStop(0,c1); g.addColorStop(1,c2); return g; };
    const lg = (x1,y1,x2,y2,c1,c2) => { const g=ctx.createLinearGradient(x1,y1,x2,y2); g.addColorStop(0,c1); g.addColorStop(1,c2); return g; };

    const drawFire = (t) => {
        for (const p of parts) {
            const pt = Math.max(0, (t - p.phase) / (1 - p.phase));
            if (pt <= 0) continue;
            const spd = 80 + p.spd * (80 + tier * 50);
            const lx = tcx + Math.cos(p.angle)*spd*pt*0.4 + p.wobble*18*pt;
            const ly = tcy - spd*pt*0.85 + 200*pt*pt*(0.3+p.spd*0.4);
            const sz = (4+p.size*8*tier*0.3) * Math.max(0,1-pt*0.9);
            const alpha = pt < 0.25 ? pt/0.25 : Math.max(0,1-(pt-0.25)/0.75);
            if (sz<=0||alpha<=0) continue;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = rg(lx,ly,sz,'#ffffff',`hsla(${15+p.hue*30},100%,50%,0)`);
            ctx.beginPath(); ctx.arc(lx,ly,sz,0,Math.PI*2); ctx.fill();
        }
        // Core fireball
        const ct = Math.min(1,t*3);
        const coreR = (15+tier*25)*(ct<0.5?ct*2:Math.max(0,2-ct*2));
        if (coreR>0) {
            ctx.globalAlpha = 0.9;
            ctx.fillStyle = rg(tcx,tcy,coreR*1.5,'#ffffff','rgba(255,100,0,0)');
            ctx.fillRect(tcx-coreR*1.5,tcy-coreR*1.5,coreR*3,coreR*3);
        }
        // Fire pillar (tier3+)
        if (tier>=3 && t<0.75) {
            const ph = (0.75-t)/0.75*(100+tier*80), pw = 10+tier*8;
            ctx.globalAlpha = (0.75-t)/0.75*0.7;
            ctx.fillStyle = lg(tcx,tcy,tcx,tcy-ph,'rgba(255,200,0,0.9)','rgba(255,50,0,0)');
            ctx.fillRect(tcx-pw/2,tcy-ph,pw,ph);
            ctx.globalAlpha = (0.75-t)/0.75*0.35;
            for (let s=-1;s<=1;s+=2) { ctx.fillStyle=lg(tcx,tcy,tcx,tcy-ph*0.7,'rgba(255,120,0,0.6)','transparent'); ctx.fillRect(tcx-pw/2+s*pw*0.8,tcy-ph*0.7,pw*0.6,ph*0.7); }
        }
        const stA = Math.max(0,0.3*(1-t*2.5)); if(stA>0){ctx.globalAlpha=stA;ctx.fillStyle='#ff2200';ctx.fillRect(0,0,W,H);}
        ctx.globalAlpha=1;
    };

    const drawIce = (t) => {
        for (const p of parts) {
            const pt = Math.max(0,(t-p.phase)/(1-p.phase));
            if (pt<=0) continue;
            const spd = 60+p.spd*(60+tier*40);
            const lx = tcx+Math.cos(p.angle)*spd*pt, ly = tcy+Math.sin(p.angle)*spd*pt;
            const sz = (3+p.size*6)*Math.max(0,1-pt*0.6);
            const alpha = pt<0.2?pt/0.2:Math.max(0,1-(pt-0.2)/0.8);
            if (sz<=0||alpha<=0) continue;
            ctx.globalAlpha = alpha*0.9;
            ctx.save(); ctx.translate(lx,ly); ctx.rotate(p.angle+pt*Math.PI*1.5);
            ctx.fillStyle = `hsl(${195+p.hue*25},${60+p.size*40}%,${65+p.hue*20}%)`;
            ctx.beginPath(); ctx.moveTo(0,-sz); ctx.lineTo(sz*0.5,0); ctx.lineTo(0,sz*1.5); ctx.lineTo(-sz*0.5,0); ctx.closePath(); ctx.fill();
            ctx.restore();
        }
        // Frost rings
        for (let ri=0; ri<(tier>=3?3:tier>=2?2:1); ri++) {
            const rp = Math.max(0,t-ri*0.15); if (rp<=0) continue;
            const r = rp*(70+tier*35), ra = Math.max(0,(1-rp)*0.7);
            ctx.globalAlpha=ra; ctx.strokeStyle=`rgba(160,220,255,${ra})`; ctx.lineWidth=2+tier-ri;
            ctx.beginPath(); ctx.arc(tcx,tcy,r,0,Math.PI*2); ctx.stroke();
        }
        // Snowflake crystal
        if (t<0.45) {
            const ft=1-t/0.45, fSz=(20+tier*15)*ft;
            ctx.globalAlpha=ft*0.9; ctx.strokeStyle='#c8eeff'; ctx.lineWidth=1.5;
            for (let a=0;a<6;a++) {
                const ag=a*Math.PI/3;
                ctx.beginPath(); ctx.moveTo(tcx,tcy); ctx.lineTo(tcx+Math.cos(ag)*fSz,tcy+Math.sin(ag)*fSz); ctx.stroke();
                const bx=tcx+Math.cos(ag)*fSz*0.6, by=tcy+Math.sin(ag)*fSz*0.6;
                for (let b=-1;b<=1;b+=2){ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(ag+b*Math.PI/3)*fSz*0.3,by+Math.sin(ag+b*Math.PI/3)*fSz*0.3);ctx.stroke();}
            }
        }
        const stA=Math.max(0,0.22*(1-t*2.5)); if(stA>0){ctx.globalAlpha=stA;ctx.fillStyle='#88ddff';ctx.fillRect(0,0,W,H);}
        ctx.globalAlpha=1;
    };

    const _buildBolt = (x1,y1,x2,y2,d,dep,segs) => {
        if (dep<=0||d<2){segs.push([x1,y1,x2,y2]);return;}
        const mx=(x1+x2)/2+(Math.random()-0.5)*d, my=(y1+y2)/2+(Math.random()-0.5)*d;
        _buildBolt(x1,y1,mx,my,d/2,dep-1,segs); _buildBolt(mx,my,x2,y2,d/2,dep-1,segs);
        if (Math.random()<0.35&&dep>1){const bx=mx+(Math.random()-0.5)*d*1.5,by=my+Math.random()*d*0.6;_buildBolt(mx,my,bx,by,d/3,dep-2,segs);}
    };
    const _drawBolt = (x1,y1,x2,y2,d,dep,al) => {
        const segs=[]; _buildBolt(x1,y1,x2,y2,d,dep,segs);
        ctx.strokeStyle=`rgba(120,120,255,${al*0.4})`; ctx.lineWidth=(2+dep)*1.5;
        ctx.beginPath(); segs.forEach(([a,b,c,e])=>{ctx.moveTo(a,b);ctx.lineTo(c,e);}); ctx.stroke();
        ctx.strokeStyle=`rgba(255,255,255,${al})`; ctx.lineWidth=1+dep*0.4;
        ctx.beginPath(); segs.forEach(([a,b,c,e])=>{ctx.moveTo(a,b);ctx.lineTo(c,e);}); ctx.stroke();
    };

    const drawLightning = (t) => {
        const flashes = tier>=3?6:tier>=2?4:2;
        const cycleT = (t*flashes)%1;
        if (cycleT<0.55) {
            const fa=Math.sin(cycleT/0.55*Math.PI)*0.9;
            for (let b=0;b<1+tier;b++) {
                const sx=W*(0.15+b*0.7/(1+tier))+(Math.random()-0.5)*40;
                const sy=isEnemy?0:H*0.5;
                _drawBolt(sx,sy,tcx+(Math.random()-0.5)*30,tcy,20+tier*12,4,fa);
            }
            ctx.globalAlpha=fa*0.9; ctx.fillStyle='#ffffaa';
            for (let i=0;i<6+tier*4;i++){const sa=i/(6+tier*4)*Math.PI*2+Math.random()*0.5,sr=15+Math.random()*(30+tier*15);ctx.fillRect(tcx+Math.cos(sa)*sr-1,tcy+Math.sin(sa)*sr-1,2,2);}
            ctx.globalAlpha=fa*(0.1+tier*0.06); ctx.fillStyle='#ffffd0'; ctx.fillRect(0,0,W,H);
        }
        ctx.globalAlpha=1;
    };

    const drawWind = (t) => {
        for (let i=0;i<2+tier;i++) {
            const p=parts[i*2%N], ph=p.phase+i*0.12;
            const pt=Math.max(0,(t-ph)/(1-ph)); if(pt<=0||pt>=1) continue;
            const alpha=pt<0.25?pt/0.25:Math.max(0,1-(pt-0.25)/0.75);
            const yOff=p.wobble*0.5*70;
            ctx.globalAlpha=alpha*0.85;
            const hue=85+p.hue*50;
            ctx.strokeStyle=`hsl(${hue},85%,65%)`; ctx.lineWidth=2+tier*0.7;
            ctx.shadowColor=`hsl(${hue},100%,70%)`; ctx.shadowBlur=6;
            ctx.beginPath();
            const sx=-80+pt*(W+160);
            ctx.moveTo(sx-50,tcy+yOff-15); ctx.bezierCurveTo(sx,tcy+yOff-35,sx+50,tcy+yOff+35,sx+100,tcy+yOff); ctx.stroke();
            clearGlow();
        }
        if (tier>=2) {
            for (const p of parts) {
                const pt=Math.max(0,(t-p.phase*0.5)/(1-p.phase*0.5)); if(pt<=0||pt>=1) continue;
                const angle=p.angle+t*(3+tier)*Math.PI;
                const r=(25+p.spd*(40+tier*20))*Math.min(1,pt*4)*Math.max(0,1-pt*0.7);
                const lx=tcx+Math.cos(angle)*r, ly=tcy+Math.sin(angle)*r*0.55-t*40;
                const alpha=pt<0.4?pt/0.4:Math.max(0,1-(pt-0.4)/0.6);
                ctx.globalAlpha=alpha*0.7; ctx.fillStyle=`hsl(${90+p.hue*70},85%,62%)`;
                ctx.beginPath(); ctx.arc(lx,ly,1.5+p.size*2.5,0,Math.PI*2); ctx.fill();
            }
        }
        const stA=Math.max(0,0.18*(1-t*2.5)); if(stA>0){ctx.globalAlpha=stA;ctx.fillStyle='#88dd44';ctx.fillRect(0,0,W,H);}
        ctx.globalAlpha=1;
    };

    const drawHeal = (t) => {
        const isRevive=sid.includes('zao')||sid.includes('zaorn');
        const gold=isRevive||tier>=4;
        for (const p of parts) {
            const pt=Math.max(0,(t-p.phase)/(1-p.phase)); if(pt<=0||pt>=1) continue;
            const lx=tcx+p.wobble*(35+tier*15)+Math.sin(pt*Math.PI*2.5+p.hue*6)*12;
            const ly=tcy+30-pt*(80+tier*35);
            const sz=(2.5+p.size*4)*Math.min(1,pt*4)*Math.max(0,1-pt);
            ctx.globalAlpha=Math.max(0,1-pt*1.1);
            ctx.fillStyle=rg(lx,ly,sz*1.8,'#ffffff',gold?'rgba(255,220,80,0)':'rgba(100,255,150,0)');
            ctx.beginPath(); ctx.arc(lx,ly,sz*1.8,0,Math.PI*2); ctx.fill();
        }
        const glowT=t<0.35?t/0.35:Math.max(0,1-(t-0.35)/0.65);
        const glowR=(35+tier*25)*glowT;
        if (glowR>0) {
            ctx.globalAlpha=glowT*0.55;
            ctx.fillStyle=rg(tcx,tcy,glowR*1.5,gold?'rgba(255,240,150,0.9)':'rgba(100,255,150,0.9)','transparent');
            ctx.fillRect(tcx-glowR*1.5,tcy-glowR*1.5,glowR*3,glowR*3);
        }
        if (tier>=3&&t<0.8) {
            const ph=(0.8-t)/0.8*(120+tier*60), pw=18+tier*6;
            ctx.globalAlpha=(0.8-t)/0.8*0.5;
            ctx.fillStyle=lg(tcx,tcy,tcx,tcy-ph,gold?'rgba(255,255,180,0.8)':'rgba(150,255,200,0.8)','transparent');
            ctx.fillRect(tcx-pw/2,tcy-ph,pw,ph);
        }
        if (tier>=4&&t<0.65) {
            const wt=(0.65-t)/0.65;
            ctx.globalAlpha=wt*0.8; ctx.strokeStyle=gold?'#ffffaa':'#aaffcc'; ctx.lineWidth=2;
            ctx.shadowColor=gold?'#ffff44':'#44ff88'; ctx.shadowBlur=8;
            ctx.beginPath();
            ctx.moveTo(tcx,tcy-10); ctx.bezierCurveTo(tcx-50,tcy-75,tcx-90,tcy-30,tcx-70,tcy+15);
            ctx.moveTo(tcx,tcy-10); ctx.bezierCurveTo(tcx+50,tcy-75,tcx+90,tcy-30,tcx+70,tcy+15);
            ctx.stroke(); clearGlow();
        }
        const stA=Math.max(0,0.15*glowT); if(stA>0){ctx.globalAlpha=stA;ctx.fillStyle=gold?'#ffffaa':'#44ff88';ctx.fillRect(0,0,W,H);}
        ctx.globalAlpha=1;
    };

    const drawExplosion = (t) => {
        for (let ri=0;ri<tier;ri++) {
            const rp=Math.max(0,t-ri*0.12); if(rp<=0) continue;
            const r=rp*(80+tier*45), alpha=Math.max(0,1-rp*1.3);
            ctx.globalAlpha=alpha; ctx.strokeStyle=`hsl(${25+ri*20},100%,${55+ri*10}%)`;
            ctx.lineWidth=Math.max(0.5,4-ri-rp*3); ctx.beginPath(); ctx.arc(tcx,tcy,r,0,Math.PI*2); ctx.stroke();
        }
        for (const p of parts) {
            const pt=Math.max(0,(t-p.phase)/(1-p.phase)); if(pt<=0) continue;
            const spd=50+p.spd*(100+tier*40);
            const lx=tcx+Math.cos(p.angle)*spd*pt, ly=tcy+Math.sin(p.angle)*spd*pt+180*pt*pt;
            const sz=(2+p.size*4)*Math.max(0,1-pt*0.8);
            ctx.globalAlpha=Math.max(0,1-pt);
            ctx.fillStyle=`hsl(${p.hue*80},100%,${55+p.hue*25}%)`; ctx.fillRect(lx-sz/2,ly-sz/2,sz,sz);
        }
        if (t<0.2){ctx.globalAlpha=(0.2-t)/0.2*0.8;const r=(0.2-t)/0.2*(60+tier*40);ctx.fillStyle=rg(tcx,tcy,r,'#ffffff','transparent');ctx.fillRect(tcx-r,tcy-r,r*2,r*2);}
        if (t<0.12){ctx.globalAlpha=(0.12-t)/0.12*0.65;ctx.fillStyle='#ffffff';ctx.fillRect(0,0,W,H);}
        else{const stA=Math.max(0,0.3*(1-t*2));if(stA>0){ctx.globalAlpha=stA;ctx.fillStyle='#ff6600';ctx.fillRect(0,0,W,H);}}
        ctx.globalAlpha=1;
    };

    const drawDark = (t) => {
        for (const p of parts) {
            const pt=Math.max(0,(t-p.phase)/(1-p.phase)); if(pt<=0||pt>=1) continue;
            const startR=80+p.spd*(60+tier*30);
            const angle=p.angle+t*Math.PI*(2.5+tier*0.5);
            const curR=startR*(1-Math.min(1,t*1.3)*0.85);
            const lx=tcx+Math.cos(angle)*curR, ly=tcy+Math.sin(angle)*curR*0.7;
            const sz=(2+p.size*3)*Math.max(0,t<0.7?1:(1-t)*3.3);
            const alpha=Math.max(0,(t<0.7?Math.min(1,t*2):(1-t)*3.3)*0.85);
            ctx.globalAlpha=alpha;
            ctx.fillStyle=`hsl(${270+p.hue*60},${60+p.hue*30}%,${20+p.size*30}%)`; ctx.beginPath(); ctx.arc(lx,ly,sz,0,Math.PI*2); ctx.fill();
        }
        if (t>0.2){const vt=(t-0.2)/0.8,r=vt*(35+tier*18);ctx.globalAlpha=Math.min(1,vt*1.5)*0.75;ctx.fillStyle=rg(tcx,tcy,r,'#000000','rgba(80,0,120,0)');ctx.fillRect(tcx-r,tcy-r,r*2,r*2);}
        if (tier>=2){const tc2=2+tier;for(let i=0;i<tc2;i++){const ag=(i/tc2)*Math.PI*2+t*Math.PI,len=(40+tier*20)*Math.min(1,t*2)*Math.max(0,1-t);ctx.globalAlpha=Math.min(1,t*2)*Math.max(0,1-t)*0.6;ctx.strokeStyle='rgba(160,0,200,0.7)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(tcx,tcy);ctx.lineTo(tcx+Math.cos(ag)*len,tcy+Math.sin(ag)*len*0.7);ctx.stroke();}}
        const stA=Math.max(0,0.22*(1-t*2)); if(stA>0){ctx.globalAlpha=stA;ctx.fillStyle='#110022';ctx.fillRect(0,0,W,H);}
        ctx.globalAlpha=1;
    };

    const drawBuff = (t) => {
        const isDebuff=etype==='debuff', baseHue=isDebuff?280:60;
        for (const p of parts) {
            const pt=Math.max(0,(t-p.phase)/(1-p.phase)); if(pt<=0||pt>=1) continue;
            const orbitR=(25+p.spd*40)*Math.min(1,pt*2.5)*Math.max(0,1-(pt-0.5)*2);
            const angle=p.angle+t*Math.PI*(isDebuff?-3.5:2.5);
            const lx=tcx+Math.cos(angle)*orbitR, ly=tcy+Math.sin(angle)*orbitR*0.6+(isDebuff?pt*30:-pt*25);
            const sz=(2+p.size*3)*Math.max(0,Math.sin(pt*Math.PI));
            ctx.globalAlpha=Math.max(0,Math.sin(pt*Math.PI)*0.9);
            ctx.fillStyle=`hsl(${baseHue+p.hue*50},85%,${isDebuff?45+p.hue*20:60+p.hue*20}%)`; ctx.beginPath(); ctx.arc(lx,ly,sz,0,Math.PI*2); ctx.fill();
        }
        const stA=Math.max(0,0.12*(1-t*2)); if(stA>0){ctx.globalAlpha=stA;ctx.fillStyle=isDebuff?'#aa44ff':'#aaff44';ctx.fillRect(0,0,W,H);}
        ctx.globalAlpha=1;
    };

    const drawWarp = (t) => {
        for (const p of parts) {
            const angle=p.angle+t*Math.PI*5, r=p.spd*100*Math.max(0.1,1-t);
            const lx=tcx+Math.cos(angle)*r, ly=tcy+Math.sin(angle)*r*0.6;
            ctx.globalAlpha=(1-t)*0.7; ctx.fillStyle=`hsl(${220+p.hue*60},75%,${50+p.hue*25}%)`;
            ctx.beginPath(); ctx.arc(lx,ly,2+p.size*3,0,Math.PI*2); ctx.fill();
        }
        const pr=20+t*50; ctx.globalAlpha=(1-t)*0.8;
        ctx.fillStyle=rg(tcx,tcy,pr,'#000000','rgba(80,0,180,0)'); ctx.fillRect(tcx-pr,tcy-pr,pr*2,pr*2);
        ctx.globalAlpha=1;
    };

    const drawGeneric = (t) => {
        for (const p of parts) {
            const pt=Math.max(0,(t-p.phase)/(1-p.phase)); if(pt<=0) continue;
            const spd=40+p.spd*80, lx=tcx+Math.cos(p.angle)*spd*pt, ly=tcy+Math.sin(p.angle)*spd*pt;
            ctx.globalAlpha=Math.max(0,1-pt*1.2); ctx.fillStyle=`hsl(${p.hue*360},60%,80%)`;
            ctx.beginPath(); ctx.arc(lx,ly,(3+p.size*5)*Math.max(0,1-pt),0,Math.PI*2); ctx.fill();
        }
        const stA=Math.max(0,0.2*(1-t*2.5)); if(stA>0){ctx.globalAlpha=stA;ctx.fillStyle='#ffffff';ctx.fillRect(0,0,W,H);}
        ctx.globalAlpha=1;
    };

    const drawFns = {fire:drawFire,ice:drawIce,lightning:drawLightning,wind:drawWind,heal:drawHeal,explosion:drawExplosion,dark:drawDark,buff:drawBuff,debuff:drawBuff,warp:drawWarp,generic:drawGeneric};
    const drawFn = drawFns[etype] || drawGeneric;

    let rafId;
    const start = performance.now();
    const animate = (now) => {
        const t = Math.min(1, (now - start) / dur);
        ctx.clearRect(0, 0, W, H);
        drawFn(t);
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
        if (t < 1) { rafId = requestAnimationFrame(animate); } else { layer.innerHTML = ''; }
    };

function fixMapExits() {
    if(!externalMapData) return;
    const _solid = [1, 2, 4, 5, 15, 16, 17, 18, 19, 20];
    // 出口タイル(tx,ty)から1歩「内側」（マップ中心方向で通行可能な隣接タイル）を返す
    function _inwardTile(map, tx, ty) {
        let mc_x = Math.floor(map.width/2), mc_y = Math.floor(map.height/2);
        let dirs = [[0,1],[0,-1],[1,0],[-1,0]];
        dirs.sort((a,b) => (Math.abs(tx+a[0]-mc_x)+Math.abs(ty+a[1]-mc_y)) - (Math.abs(tx+b[0]-mc_x)+Math.abs(ty+b[1]-mc_y)));
        for(let [dx,dy] of dirs) {
            let nx=tx+dx, ny=ty+dy;
            if(nx<0||ny<0||nx>=map.width||ny>=map.height) continue;
            let t = map.tiles[ny*map.width+nx];
            if(!_solid.includes(t) && !map.exits[`${nx},${ny}`]) return {x:nx, y:ny};
        }
        return {x:tx, y:ty}; // fallback: そのまま
    }
    const maps = Object.keys(externalMapData);
    for(let mapId of maps) {
        let m1 = externalMapData[mapId]; if(!m1.exits) continue;
        for(let key in m1.exits) {
            let exit = m1.exits[key];
            let tMapKey = exit.map;
            if (!externalMapData[tMapKey]) tMapKey = "map_" + exit.map;
            if (!externalMapData[tMapKey]) tMapKey = exit.map.replace("map_", "");
            let targetMap = externalMapData[tMapKey]; if(!targetMap || !targetMap.exits) continue;
            let [ex, ey] = key.split(',').map(Number); let m1Tile = m1.tiles[ey*m1.width+ex];
            let reciprocals = [];
            for(let tKey in targetMap.exits) {
                let tExitMapId = targetMap.exits[tKey].map;
                if(tExitMapId===mapId || "map_"+tExitMapId===mapId || tExitMapId===mapId.replace("map_","")) reciprocals.push(tKey);
            }
            let chosen = null;
            if(reciprocals.length === 1) { let [tx,ty] = reciprocals[0].split(',').map(Number); chosen={x:tx,y:ty}; }
            else if(reciprocals.length > 1) {
                for(let tKey of reciprocals) {
                    let [tx,ty] = tKey.split(',').map(Number);
                    let tTile = targetMap.tiles[ty*targetMap.width+tx];
                    if((m1Tile===6&&tTile===7)||(m1Tile===7&&tTile===6)||(m1Tile===3&&tTile===3)) { chosen={x:tx,y:ty}; break; }
                }
            }
            if(chosen) {
                let inner = _inwardTile(targetMap, chosen.x, chosen.y);
                exit.x = inner.x; exit.y = inner.y;
            }
        }
    }
}

function generateDQStyleMaps() {

        const fill = (rx, ry, rw, rh) => { for (let y = ry; y < ry + rh; y++) for (let x = rx; x < rx + rw; x++) T(x, y, 0); };
        const corridor = (x1, y1, x2, y2) => {
            for (let x = Math.min(x1, x2); x <= Math.max(x1, x2); x++) T(x, y1, 0);
            for (let y = Math.min(y1, y2); y <= Math.max(y1, y2); y++) T(x2, y, 0);
        };

async function loadExternalData(id) { 
    if (externalMapData && id.includes('map-')) { 
        let rawId = id.replace('map-', ''); let mapData = null; 
        if (externalMapData[rawId]) mapData = externalMapData[rawId]; 
        else if (externalMapData['map_' + rawId]) mapData = externalMapData['map_' + rawId]; 
        else if (rawId.startsWith('map_') && externalMapData[rawId.substring(4)]) mapData = externalMapData[rawId.substring(4)]; 
        
        if (mapData) { 
            let mapCopy = JSON.parse(JSON.stringify(mapData));
            if (partyData && partyData.flags) { 
                if (partyData.flags.last_boss_defeated || partyData.flags.gate_removed) { let gateKeys = Object.keys(mapCopy.npcs).filter(k => mapCopy.npcs[k].id === 'maou_castle_gate'); gateKeys.forEach(k => { delete mapCopy.npcs[k]; }); } 
                if(partyData.flags.flag_saved_richman) { let rKey = Object.keys(mapCopy.npcs).find(k => mapCopy.npcs[k].id === "npc_sub_richman"); if(rKey) delete mapCopy.npcs[rKey]; } 
                if(partyData.flags.flag_has_star_fragment) { let sKey = Object.keys(mapCopy.npcs).find(k => mapCopy.npcs[k].id === "obj_chest_star_frag"); if(sKey) delete mapCopy.npcs[sKey]; } 
                
                // ★修正: 異世界の旅人を (9,6) に配置
                if(partyData.flags.is_second_loop && (rawId.includes("town_01") || mapCopy.name === "城下町グラマニア")) {
                    mapCopy.npcs["9,6"] = { id: "npc_sub_2ndloop", name: "異世界の旅人" };
                }
            } 
            return mapCopy; 
        } 
    } 
    const el = document.getElementById('data-' + id); if(!el) return null; return JSON.parse(el.textContent); 
}

const pressedKeys = {}; let moveInterval = null; let isMoving = false;
window.isGuraKingBattle = false;

function pressBtn(key) { AudioManager.init(); if (!pressedKeys[key]) { pressedKeys[key] = true; if (state === 'FIELD' && key.startsWith('Arrow')) { handleInput(key); if (!moveInterval) { moveInterval = setInterval(() => { if (state !== 'FIELD') { stopMoveLoop(); return; } if (pressedKeys['ArrowUp']) handleInput('ArrowUp'); else if (pressedKeys['ArrowDown']) handleInput('ArrowDown'); else if (pressedKeys['ArrowLeft']) handleInput('ArrowLeft'); else if (pressedKeys['ArrowRight']) handleInput('ArrowRight'); }, 150); } } else { handleInput(key); } } }
function releaseBtn(key) { pressedKeys[key] = false; if (!pressedKeys['ArrowUp'] && !pressedKeys['ArrowDown'] && !pressedKeys['ArrowLeft'] && !pressedKeys['ArrowRight']) { stopMoveLoop(); } }
function stopMoveLoop() { if (moveInterval) { clearInterval(moveInterval); moveInterval = null; } }
function simKey(key) { AudioManager.init(); handleInput(key); }
document.addEventListener('keydown', (e) => { let key = e.key; if(key === 'z' || key === ' ') key = 'Enter'; if(key === 'x') key = 'Escape'; if(key.startsWith('Arrow')) { pressBtn(key); } else { if(!pressedKeys[key]) { pressedKeys[key] = true; AudioManager.init(); handleInput(key); } } });
document.addEventListener('keyup', (e) => { let key = e.key; if(key === 'z' || key === ' ') key = 'Enter'; if(key === 'x') key = 'Escape'; if(key.startsWith('Arrow')) { releaseBtn(key); } else { pressedKeys[key] = false; } });
function handleInput(key) { AudioManager.init(); if(inputCallback) { inputCallback(key); } else if(state === 'FIELD') { handleFieldInput(key); } }

function onStep() {
    if (partyData.tramana_steps && partyData.tramana_steps > 0) partyData.tramana_steps--;
    if (partyData.tohero_steps && partyData.tohero_steps > 0) partyData.tohero_steps--;
}

async function handleFieldInput(key) { 
    if(isMoving) return; 
    let dx = 0, dy = 0, dir = partyData.dir; 
    if(key === 'ArrowUp') { dy = -1; dir = 0; } 
    if(key === 'ArrowRight') { dx = 1; dir = 1; } 
    if(key === 'ArrowDown') { dy = 1; dir = 2; } 
    if(key === 'ArrowLeft') { dx = -1; dir = 3; } 
    if(dx !== 0 || dy !== 0) { partyData.dir = dir; isMoving = true; try { await moveParty(dx, dy); } finally { isMoving = false; } } 
    if(key === 'Enter') { isMoving = true; try { await checkAction(); } finally { isMoving = false; } } 
    if(key === 'Escape') openMainMenu(); 
}

async function selectMenu(options, containerId, columns = 1, cancelable = false) { const el = document.getElementById(containerId); el.style.display = 'block'; return new Promise(resolve => { let cursor = 0; const render = () => { let html = `<div style="display:grid; grid-template-columns:repeat(${columns}, 1fr); gap: 5px;">`; options.forEach((opt, i) => { html += `<div>${i === cursor ? '▶' : '&nbsp;&nbsp;'}${opt}</div>`; }); html += `</div>`; el.innerHTML = html; }; render(); inputCallback = (key) => { let moved = false; if(key === 'ArrowUp') { cursor = (cursor - columns + options.length) % options.length; moved = true; } if(key === 'ArrowDown') { cursor = (cursor + columns) % options.length; moved = true; } if(key === 'ArrowLeft') { cursor = (cursor - 1 + options.length) % options.length; moved = true; } if(key === 'ArrowRight') { cursor = (cursor + 1) % options.length; moved = true; } if(moved) AudioManager.playSE('cursor'); render(); if(key === 'Enter') { AudioManager.playSE('decision'); inputCallback = null; el.style.display = 'none'; resolve(cursor); } if(cancelable && key === 'Escape') { AudioManager.playSE('cancel'); inputCallback = null; el.style.display = 'none'; resolve(-1); } }; }); }

function updatePartyStatus() { 
    const el = document.getElementById('party-status'); 
    el.innerHTML = partyData.members.map(m => { 
        let hpCol = '#fff'; if (m.hp <= m.max_hp / 3 || m.hp === 0) hpCol = '#f55'; else if (m.hp <= m.max_hp / 2) hpCol = '#fa0'; 
        let mpCol = '#fff'; if (m.max_mp > 0 && m.mp <= m.max_mp / 3) mpCol = '#f55'; else if (m.max_mp > 0 && m.mp <= m.max_mp / 2) mpCol = '#fa0'; 
        let statIcon = m.isPoisoned ? '<span style="color:#a4f;font-size:10px;">[毒]</span> ' : '';
        return `<div class="${m.hp<=0?'dead':''}">${statIcon}${m.name} LV.${m.lv}<br><span style="color:${hpCol}">H ${Math.max(0, m.hp)}/${m.max_hp}</span><br><span style="color:${mpCol}">M ${m.mp}/${m.max_mp}</span></div>`; 
    }).join(''); 
}
function getAtk(char) {
    let atk = char.atk;
    if(char.equipment && char.equipment.weapon && masterData.items[char.equipment.weapon]) atk += masterData.items[char.equipment.weapon].power || 0;
    if(char.equipment && char.equipment.accessory && masterData.items[char.equipment.accessory]) {
        let acc = masterData.items[char.equipment.accessory];
        if(acc.effect === 'str_up') atk += 40;
    }
    return Math.max(0, atk);
}
function getDef(char) {
    let def = char.def;
    if(char.equipment) {
        if(char.equipment.armor && masterData.items[char.equipment.armor]) def += masterData.items[char.equipment.armor].power || 0;
        if(char.equipment.shield && masterData.items[char.equipment.shield]) def += masterData.items[char.equipment.shield].power || 0;
        if(char.equipment.helmet && masterData.items[char.equipment.helmet]) def += masterData.items[char.equipment.helmet].power || 0;
        if(char.equipment.accessory && masterData.items[char.equipment.accessory]) {
            let acc = masterData.items[char.equipment.accessory];
            if(acc.effect === 'atk_up_crit') return 0; // 魔神の指輪: 守備力0
            def += acc.power || 0;
        }
    }
    return Math.max(0, def);
}
function getSpd(char) {
    let spd = char.spd;
    if(char.equipment && char.equipment.accessory && masterData.items[char.equipment.accessory]) {
        let acc = masterData.items[char.equipment.accessory];
        if(acc.effect === 'speed_double' || acc.effect === 'agi_double') spd *= 2;
        else if(acc.effect === 'speed_up' || acc.id === 'acc_star_bracelet') spd += 50;
        else if(acc.effect === 'agi_up') spd += 30;
    }
    return Math.max(0, spd);
}

function calculateDamage(attacker, defender) {
    let atkMod = attacker.tmpAtk > 0 ? 1.5 : attacker.tmpAtk < 0 ? 0.5 : 1.0;
    let defMod = defender.tmpDef > 0 ? 1.5 : defender.tmpDef < 0 ? 0.5 : 1.0;
    
    if (window.isGuraKingBattle && attacker.job) {
        atkMod *= 0.9;
    }
    
    const finalAttack = getAtk(attacker) * atkMod; const finalDefense = getDef(defender) * defMod;
    
    let criticalRate = 0.1;
    if (attacker.job === "忍者" || attacker.job === "踊り子") {
        criticalRate = 0.15;
    } else if (attacker.job === "パンダ" || attacker.job === "ネコ") {
        criticalRate = 0.1;
    }
    if (attacker.equipment && attacker.equipment.weapon === 'w13') criticalRate = 0.4; // まじんのカナヅチ
    if (attacker.equipment && attacker.equipment.accessory && masterData.items[attacker.equipment.accessory]?.effect === 'atk_up_crit') criticalRate = Math.min(0.8, criticalRate + 0.3);
    
    const isCritical = Math.random() < criticalRate && attacker.job;

    if (isCritical) {
        const critDmg = Math.floor(finalAttack * (0.9 + Math.random() * 0.2));
        return { isCritical: true, value: Math.max(1, critDmg) };
    } else {
        let baseDmg = Math.floor(finalAttack/2 - finalDefense/4) + Math.floor(Math.random()*2);
        return { isCritical: false, value: Math.max(1, baseDmg) };
    }
}

function playCriticalEffect(colorStr = 'brightness(3)') {
    const container = document.getElementById('game-container');
    container.style.transition = 'none';
    container.style.filter = colorStr.includes('brightness') ? colorStr : `drop-shadow(0 0 20px ${colorStr}) invert(1)`;
    setTimeout(() => { container.style.transition = 'filter 0.1s'; container.style.filter = 'brightness(1)'; }, 150);
}

function updateTurnStatus(char) {
    if (char.tmpAtkDuration && char.tmpAtkDuration > 0) { char.tmpAtkDuration--; if (char.tmpAtkDuration <= 0) { char.tmpAtk = 0; } }
    if (char.tmpDefDuration && char.tmpDefDuration > 0) { char.tmpDefDuration--; if (char.tmpDefDuration <= 0) { char.tmpDef = 0; } }
    if (char.tmpSpdDuration && char.tmpSpdDuration > 0) { char.tmpSpdDuration--; if (char.tmpSpdDuration <= 0) { char.tmpSpd = 0; } }
    if (char.tmpSleep && char.tmpSleep > 0) char.tmpSleep--;
    if (char.tmpSilence && char.tmpSilence > 0) char.tmpSilence--;
    if (char.tmpBlind && char.tmpBlind > 0) char.tmpBlind--;
    if (char.tmpResist && char.tmpResist > 0) char.tmpResist--;
    if (char.tmpReflect && char.tmpReflect > 0) char.tmpReflect--;
}

function resetBattleState(char) {
    char.tmpAtk = 0; char.tmpAtkDuration = 0; char.tmpDef = 0; char.tmpDefDuration = 0; char.tmpSpd = 0; char.tmpSpdDuration = 0;
    char.tmpSleep = 0; char.tmpSilence = 0; char.tmpBlind = 0; char.tmpResist = 0; char.tmpReflect = 0;
}

        AudioManager.playBGM('victory'); await typeMessage(`まものたちを やっつけた！`); partyData.gold += totalGold; await typeMessage(`${totalExp}の けいけんちを かくとく！\n${totalGold}G をてにいれた！`);
        
        const _isEquipDrop = totalExp >= 50 && Math.random() < 0.35;
        if (Math.random() < 0.18) {
            let dropPool = Object.values(masterData.items).filter(i => i.price > 0 && (_isEquipDrop ? i.type !== 'tool' : i.type === 'tool'));
            if (dropPool.length === 0) dropPool = Object.values(masterData.items).filter(i => i.price > 0 && i.type === 'tool');
            if (dropPool.length > 0) {
                let targetPrice = totalExp * 5;
                let candidates = dropPool.filter(i => i.price <= targetPrice && i.price >= targetPrice / 8);
                if (candidates.length === 0) candidates = dropPool.filter(i => i.price <= Math.max(300, targetPrice));
                if (candidates.length === 0) candidates = [dropPool[0]];
                let dropItem;
                if (_isEquipDrop && candidates.length > 1) {
                    let weights = candidates.map(i => Math.max(1, Math.floor(3000 / i.price)));
                    let totalW = weights.reduce((a, b) => a + b, 0); let r = Math.random() * totalW; let cumW = 0; dropItem = candidates[0];
                    for (let _di = 0; _di < candidates.length; _di++) { cumW += weights[_di]; if (r <= cumW) { dropItem = candidates[_di]; break; } }
                } else { dropItem = candidates[Math.floor(Math.random() * candidates.length)]; }
                AudioManager.playSE('item_get'); await typeMessage(`まものが たからばこを おとしていった！\n『${dropItem.name}』 をてにいれた！`);
                let target = partyData.members.find(m => m.inventory.length < 8 && m.hp > 0); if (!target) target = partyData.members.find(m => m.inventory.length < 8);
                if (target) { target.inventory.push(dropItem.id); await typeMessage(`${target.name}は ${dropItem.name}を ふくろに いれた。`); } else { await typeMessage(`しかし もちものが いっぱいだ！\nなくなく あきらめた。`); }
            }
        }
        
        for(let m of partyData.members) {
            if(m.hp <= 0) continue; m.exp += totalExp;
            if (masterData.growth && masterData.growth[m.job]) {
                let growthTable = masterData.growth[m.job]; let nextLevelData = growthTable.find(g => g.level === m.lv + 1);
                while(nextLevelData && m.exp >= nextLevelData.reqExp) {
                    m.lv++; let old_hp = m.max_hp; let old_mp = m.max_mp; let old_atk = m.atk; let old_def = m.def; let old_spd = m.spd;
                    m.max_hp = nextLevelData.hp; m.max_mp = nextLevelData.mp; m.atk = nextLevelData.atk; m.def = nextLevelData.def; m.spd = nextLevelData.spd; m.hp = m.max_hp; m.mp = m.max_mp;
                    AudioManager.playSE('level_up'); await typeMessage(`チャララチャッチャッチャー♪\n${m.name}は レベル${m.lv} になった！`);
                    let dHp = m.max_hp - old_hp; let dMp = m.max_mp - old_mp; let dAtk = m.atk - old_atk; let dDef = m.def - old_def; let dSpd = m.spd - old_spd;
                    let sMsg = ""; if(dHp > 0) sMsg += `さいだいHPが ${dHp} あがった！\n`; if(dMp > 0) sMsg += `さいだいMPが ${dMp} あがった！\n`; if(dAtk > 0) sMsg += `ちからが ${dAtk} あがった！\n`; if(dDef > 0) sMsg += `みのまもりが ${dDef} あがった！\n`; if(dSpd > 0) sMsg += `すばやさが ${dSpd} あがった！\n`; if(sMsg !== "") await typeMessage(sMsg.trim());
                    if (nextLevelData.learnMagic && nextLevelData.learnMagic.length > 0) { for(let magicName of nextLevelData.learnMagic) { const found = Object.values(masterData.spells).find(s => s.name === magicName); if (found && !m.spells.includes(found.id)) { m.spells.push(found.id); await typeMessage(`${m.name}は ${found.name} のじゅもんを\nおぼえた！`); } } }
                    nextLevelData = growthTable.find(g => g.level === m.lv + 1);
                }
            }
        }
    } else if (!escaped) {
        AudioManager.playBGM('game_over'); await typeMessage(`ゆうしゃたちは ぜんめつした...`);
        const screen = document.getElementById('screen'); screen.style.transition = 'opacity 1.5s'; screen.style.opacity = '0'; await new Promise(r => setTimeout(r, 2000));
        partyData.gold = Math.floor(partyData.gold / 2);
        if(partyData.members[0]) { partyData.members[0].hp = partyData.members[0].max_hp; partyData.members[0].mp = partyData.members[0].max_mp; } for(let i = 1; i < partyData.members.length; i++) { partyData.members[i].hp = 0; partyData.members[i].isPoisoned = false; }
        let savedPos = null; try { let s = localStorage.getItem('gravity_quest_save'); if (s) { let parsed = JSON.parse(s); if (parsed && parsed.pos) savedPos = parsed.pos; } } catch(e) {}
        if (savedPos) { partyData.pos = { map: savedPos.map, x: savedPos.x, y: savedPos.y }; } else { let startMap = Object.keys(externalMapData)[0]; partyData.pos = { map: startMap, x: 7, y: 7 }; }
        partyData.dir = 2; currentMap = await loadExternalData('map-' + partyData.pos.map);
        bScreen.style.display = 'none'; screen.style.display = 'block'; hideAllWindows(); state = 'FIELD'; drawMap(); updateBGM();
        screen.style.opacity = '1'; await new Promise(r => setTimeout(r, 1000)); screen.style.transition = '';
        let leaderName = partyData.members[0] ? partyData.members[0].name : "ゆうしゃ"; await typeMessage(`おお ${leaderName}！\nしんでしまうとは なにごとだ！`); await typeMessage(`そなたに もういちど 機会をあたえよう。\nふたたび たびだつのだ！`);
        updateGoldWindow(); updatePartyStatus(); hideAllWindows(); state = 'FIELD'; 
        return false;
    }
    
    partyData.members.forEach(m => { resetBattleState(m); }); 
    bScreen.style.display = 'none'; document.getElementById('screen').style.display = 'block'; hideAllWindows(); state = 'FIELD'; drawMap(); updateBGM();
    
    return (!escaped && partyData.members.some(m=>m.hp>0)); 
}

async function startSecondLoop(parsedOldData) {
    let bestWeaponId = null; let maxPwr = 0;
    if (parsedOldData && parsedOldData.members) {
        parsedOldData.members.forEach(m => {
            if(m.equipment.weapon) { let w = masterData.items[m.equipment.weapon]; if(w && w.power > maxPwr) { maxPwr = w.power; bestWeaponId = w.id; } }
            m.inventory.forEach(itemId => { let it = masterData.items[itemId]; if(it && it.type === 'weapon' && it.power > maxPwr) { maxPwr = it.power; bestWeaponId = it.id; } });
        });
    }
    partyData = await loadExternalData('party'); partyData.flags = { is_second_loop: true };
    if(externalMapData) { partyData.pos.map = Object.keys(externalMapData)[0]; partyData.pos.x = 7; partyData.pos.y = 7; }
    applyGrowthDataToParty(true);
    for(let i=0; i<partyData.members.length; i++) {
        let m = partyData.members[i]; let oldM = (parsedOldData && parsedOldData.members) ? parsedOldData.members[i] : null;
        let defaultName = oldM ? oldM.name.substring(0,3) + "Ⅱ" : m.name;
        let input = await showCustomDialog('prompt', `${m.job} の名前を決めてください\n（最大4文字）\n空白で「${defaultName}」`, defaultName);
        m.name = (input !== null && input.trim() !== "") ? input.trim().substring(0, 4) : defaultName;
    }
    if(bestWeaponId) { partyData.members[0].equipment.weapon = bestWeaponId; await showCustomDialog('alert', `【強くてニューゲーム】\n前世の記憶と ともに\n最強の武器「${masterData.items[bestWeaponId].name}」を\n引き継ぎました！\n\n※敵の強さが2倍になります。`); } 
    else { await showCustomDialog('alert', `【強くてニューゲーム】\n※敵の強さが2倍になります。`); }
}

async function showTitleScreen() {
    await fetchExternalMap("https://www.gravity.place/share/ugcGame?id=36783");
    await loadExternalGrowthDatabase("https://www.gravity.place/share/ugcGame?id=38430");
    if (!masterData.growth) masterData.growth = {};
    if (window.EXT_GROWTH) {
        window.EXT_GROWTH.characterData.forEach(char => {
            if (!masterData.growth[char.job] && char.growth && char.growth.length > 0)
                masterData.growth[char.job] = char.growth;
        });
    }
    state = 'TITLE'; document.getElementById('title-screen').style.display = 'flex'; AudioManager.playBGM('title');
    while(true) {
        let s = localStorage.getItem('gravity_quest_save'); let hasClearData = false;
        if(s) { let parsed = JSON.parse(s); if(parsed.flags && parsed.flags.is_second_loop_unlocked) hasClearData = true; }
        let menuOpts = ['はじめから', 'ぼうけんのしょ']; if (hasClearData) menuOpts.push('つづきから（2周目）'); menuOpts.push('ふっかつのじゅもん', 'ぼうけんのしょを消す');
        let choiceIdx = await selectMenu(menuOpts, 'title-menu-box'); if(choiceIdx === -1) continue; let choiceStr = menuOpts[choiceIdx];
        if(choiceStr === 'はじめから') {
            partyData = await loadExternalData('party'); partyData.flags = { none: true };
            if(externalMapData) { partyData.pos.map = Object.keys(externalMapData)[0]; partyData.pos.x = 7; partyData.pos.y = 7; }
            applyGrowthDataToParty(true);
            for(let i=0; i<partyData.members.length; i++) { let m = partyData.members[i]; let input = await showCustomDialog('prompt', `${m.job} の名前を決めてください\n（最大4文字）\n空白で「${m.name}」`, m.name); if(input !== null && input.trim() !== "") { m.name = input.trim().substring(0, 4); } }
            break;
        }
        else if(choiceStr === 'ぼうけんのしょ') {
            if(s) { partyData = JSON.parse(s); partyData.members.forEach(m => { if (!m.equipment.shield) m.equipment.shield = null; if (!m.equipment.helmet) m.equipment.helmet = null; if (!m.equipment.accessory) m.equipment.accessory = null; }); applyGrowthDataToParty(false); break; } 
            else { await showCustomDialog('alert', "ぼうけんのしょ が ありません。"); }
        }
        else if(choiceStr === 'つづきから（2周目）') { let parsed = JSON.parse(s); await startSecondLoop(parsed); break; }
        else if(choiceStr === 'ふっかつのじゅもん') {
            let pwd = await showCustomDialog('prompt', "神父に聞いた ふっかつのじゅもん を\n入力してください。\n（裏技の入力もここです）");
            if(pwd !== null) {
                pwd = pwd.trim();
                if(pwd === "GRAVITY最高！") {
                    partyData = await loadExternalData('party'); partyData.flags = { none: true }; if(externalMapData) { partyData.pos.map = Object.keys(externalMapData)[0]; partyData.pos.x = 7; partyData.pos.y = 7; } applyGrowthDataToParty(true);
                    let weps = Object.values(masterData.items).filter(i=>i.type==='weapon').sort((a,b)=>b.power-a.power); let arms = Object.values(masterData.items).filter(i=>i.type==='armor').sort((a,b)=>b.power-a.power); let shds = Object.values(masterData.items).filter(i=>i.type==='shield').sort((a,b)=>b.power-a.power); let hlms = Object.values(masterData.items).filter(i=>i.type==='helmet').sort((a,b)=>b.power-a.power);
                    partyData.members.forEach(m => { m.equipment.weapon=weps[0]?.id; m.equipment.armor=arms[0]?.id; m.equipment.shield=shds[0]?.id; m.equipment.helmet=hlms[0]?.id; });
                    for(let i=0; i<partyData.members.length; i++) { let m = partyData.members[i]; let input = await showCustomDialog('prompt', `${m.job} の名前を決めてください\n空白で「${m.name}」`, m.name); if(input !== null && input.trim() !== "") m.name = input.trim().substring(0, 4); }
                    await showCustomDialog('alert', "【裏技成功】\n全員が 最強の装備 を手に入れた\n状態で始まります！"); break;
                }
                else if(pwd === "グラちゃんすきすき") {
                    partyData = await loadExternalData('party'); partyData.flags = { none: true }; if(externalMapData) { partyData.pos.map = Object.keys(externalMapData)[0]; partyData.pos.x = 7; partyData.pos.y = 7; } applyGrowthDataToParty(true);
                    partyData.members.forEach(m => { m.lv = 25; m.exp = 99999; if (masterData.growth && masterData.growth[m.job]) { let gt = masterData.growth[m.job]; let lvD = gt.find(g => g.level === 25) || gt[gt.length-1]; if(lvD) { m.max_hp=lvD.hp; m.max_mp=lvD.mp; m.atk=lvD.atk; m.def=lvD.def; m.spd=lvD.spd; m.hp=m.max_hp; m.mp=m.max_mp; m.spells=[]; for(let lvl=1; lvl<=25; lvl++) { let d = gt.find(g => g.level === lvl); if(d?.learnMagic) { d.learnMagic.forEach(name => { const fd = Object.values(masterData.spells).find(s => s.name === name); if(fd && !m.spells.includes(fd.id)) m.spells.push(fd.id); }); } } } } });
                    for(let i=0; i<partyData.members.length; i++) { let m = partyData.members[i]; let input = await showCustomDialog('prompt', `${m.job} の名前を決めてください\n空白で「${m.name}」`, m.name); if(input !== null && input.trim() !== "") m.name = input.trim().substring(0, 4); }
                    await showCustomDialog('alert', "【裏技成功】\n全員の レベルが25 の状態で\n始まります！"); break;
                }
                else if(pwd === "ようきな壺") {
                    partyData = await loadExternalData('party'); partyData.flags = { none: true }; if(externalMapData) { partyData.pos.map = Object.keys(externalMapData)[0]; partyData.pos.x = 7; partyData.pos.y = 7; } applyGrowthDataToParty(true); partyData.gold = 10000;
                    for(let i=0; i<partyData.members.length; i++) { let m = partyData.members[i]; let input = await showCustomDialog('prompt', `${m.job} の名前を決めてください\n空白で「${m.name}」`, m.name); if(input !== null && input.trim() !== "") m.name = input.trim().substring(0, 4); }
                    await showCustomDialog('alert', "【裏技成功】\n所持金が 10000G の状態で\n始まります！"); break;
                }
                else if(pwd === "人生五十年") { await startSecondLoop(null); break; }
                else if(pwd !== "") {
                    let unpacked = unpackSaveData(pwd);
                    if (unpacked) {
                        if (unpacked.type === 'clear') { await startSecondLoop(unpacked.data); break; } 
                        else { partyData = unpacked.data; applyGrowthDataToParty(false); await showCustomDialog('alert', "ふっかつのじゅもん が\n受け入れられました！"); break; }
                    } else { await showCustomDialog('alert', "じゅもん が ちがいます！"); }
                }
            }
        }
        else if(choiceStr === 'ぼうけんのしょを消す') {
            let conf = await showCustomDialog('confirm', "本当に ぼうけんのしょ（セーブデータ）を\n消してもよろしいですか？\n（この操作は取り消せません）");
            if(conf) { localStorage.removeItem('gravity_quest_save'); await showCustomDialog('alert', "ぼうけんのしょ は\n完全に消し去られました。"); }
        }
    }
    document.getElementById('title-screen').style.display = 'none';
    currentMap = await loadExternalData('map-' + partyData.pos.map);
    state = 'FIELD'; drawMap(); updateBGM();
}

setInterval(() => { if (state === 'FIELD' || state === 'MSG') drawMap(); }, 100);
</script>

<script>
// ═══ STANDALONE OVERRIDE: init() — 外部fetchなしで全DB適用 ═══
window.onload = null; // 元の onload を解除
async function init() {
    resizeCanvas();
    masterData = await loadExternalData('master');

    // アイテムDB
    if (window.ITEM_DATABASE) {
        const db = window.ITEM_DATABASE;
        (db.weapons||[]).forEach(w => masterData.items[w.id] = {id:w.id,name:w.name,type:'weapon',price:w.price,power:w.attack,desc:w.description});
        (db.armors||[]).forEach(a => masterData.items[a.id] = {id:a.id,name:a.name,type:'armor',price:a.price,power:a.defense,desc:a.description});
        (db.shields||[]).forEach(s => masterData.items[s.id] = {id:s.id,name:s.name,type:'shield',price:s.price,power:s.defense,desc:s.description});
        (db.helmets||[]).forEach(h => masterData.items[h.id] = {id:h.id,name:h.name,type:'helmet',price:h.price,power:h.defense,desc:h.description});
        (db.accessories||[]).forEach(x => masterData.items[x.id] = {id:x.id,name:x.name,type:'accessory',price:x.price,power:x.defense||0,effect:x.effect,desc:x.description});
        (db.items||[]).forEach(i => masterData.items[i.id] = {id:i.id,name:i.name,type:'tool',price:i.price,effect:i.effect,value:i.value,desc:i.description});
    }
    // 魔法DB
    if (window.MAGIC_DATABASE) {
        window.MAGIC_DATABASE.forEach(m => {
            masterData.spells[m.id] = {id:m.id,name:m.name,type:m.type,target:m.target,mp:m.mp_cost,value:m.power,desc:m.description,element:m.element};
        });
    }
    // モンスターDB
    if (window.MONSTER_DATABASE) {
        window.MONSTER_DATABASE.forEach(m => {
            masterData.monsters[m.id] = {name:m.name,max_hp:m.hp,atk:m.attack,def:m.defense,spd:m.speed,exp:m.exp,gold:m.gold};
            if (m.image && m.image.startsWith('http')) {
                let img = new Image(); img.crossOrigin = "Anonymous"; img.src = m.image;
                externalImages['enemy_' + m.id] = img;
            }
        });
        if (masterData.monsters['slime']) masterData.monsters['m01'] = masterData.monsters['slime'];
        if (masterData.monsters['ghost']) masterData.monsters['m02'] = masterData.monsters['ghost'];
        if (externalImages['enemy_slime']) externalImages['enemy_m01'] = externalImages['enemy_slime'];
        if (externalImages['enemy_ghost']) externalImages['enemy_m02'] = externalImages['enemy_ghost'];
    }
    // 成長DB
    if (window.EXT_GROWTH) {
        const ext = window.EXT_GROWTH;
        masterData.growth = {};
        (ext.characterData || []).forEach(char => {
            masterData.growth[char.job] = char.growth;
            if (char.sprites) {
                const li = (src) => { let img = new Image(); img.crossOrigin="Anonymous"; img.src=src; return img; };
                externalImages['sprite_' + char.id + '_down']  = li(char.sprites.down);
                externalImages['sprite_' + char.id + '_up']    = li(char.sprites.up);
                externalImages['sprite_' + char.id + '_left']  = li(char.sprites.left);
            }
        });
    }
    // 音楽DB
    if (window.SOUND_DATABASE) AudioManager.db = window.SOUND_DATABASE;
    // 2周目モンスターDB
    if (window.SL_MONSTER_DATABASE) {
        window.SL_MONSTER_DATABASE.forEach(m => {
            let mId = "sl_m_" + m.id;
            let hp = parseInt(m.hp) || 500;
            masterData.monsters[mId] = {
                name: m.name,
                max_hp: Math.ceil(hp / 2),
                atk: Math.min(120, 30 + Math.floor(hp / 30)),
                def: Math.min(60,  15 + Math.floor(hp / 60)),
                spd: Math.min(80,  20 + Math.floor(hp / 50)),
                exp: Math.floor(hp), gold: Math.floor(hp / 2)
            };
            if (m.img) { let img = new Image(); img.crossOrigin="Anonymous"; img.src=m.img; externalImages['enemy_' + mId] = img; }
        });
    }

    showTitleScreen();
}
window.onload = init;
</script>
